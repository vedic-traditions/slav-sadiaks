<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слов'янські Чертоги</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/uk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Marck+Script&family=Ruslan+Display&display=swap');

        :root { color-scheme: dark; }
        
        * { box-sizing: border-box; }
        
        body {
            background-image: url('chertogs/Kolo.webp');
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-color: #050510;
            color: #fff;
            font-family: 'Cinzel', serif;
            text-align: center;
            margin: 0;
            padding: 1vh;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: -2;
        }

        .header {
            margin-bottom: 0.3vh;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.3vh 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 0 30px rgba(123, 44, 191, 0.4);
            min-width: 50vw;
        }

        h1.mysterious-text {
            margin: 0.5vh 0;
            font-size: clamp(24px, 4vh, 40px);
        }

        .mysterious-text {
            font-family: 'Marck Script', cursive;
            color: #ffd700;
            text-shadow: 0 0 10px #7b2cbf, 0 0 20px #7b2cbf, 0 0 30px #c77dff;
            animation: glow 3s ease-in-out infinite alternate;
        }

        label.mysterious-text {
            font-size: 1.2em;
        }

        .input-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        input[type="text"] {
            background: transparent;
            border: 2px solid #9d4edd;
            color: #ffd700;
            font-family: 'Cinzel', serif;
            font-size: clamp(14px, 2vh, 20px);
            padding: 0.5vh 10px;
            width: 250px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.8);
            border-color: #ffd700;
        }

        #result {
            margin-top: 0.3vh;
            min-height: 2vh;
        }

        .chertog-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: 1fr 1.5fr;
            gap: 1vw;
            width: 100vw;
            max-width: 100vw;
            margin: 5vh auto 0;
            padding: 0 2vw;
            height: 40vh;
        }

        .chertog-item {
            width: 100%;
            aspect-ratio: 2/3;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid transparent;
            opacity: 0.25;
            border-radius: 50%;
            overflow: hidden;
            filter: grayscale(60%) brightness(0.7);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
        }

        .chertog-item:hover {
            transform: scale(1.05);
            opacity: 1;
            filter: grayscale(0%) brightness(1);
            box-shadow: 0 0 20px 5px rgba(157, 78, 221, 0.7);
            border-color: #9d4edd;
        }

        .chertog-item:nth-child(n+9) {
            margin-top: 80%;
        }

        .chertog-item.active {
            opacity: 1;
            transform: scale(1.15);
            border-color: #ffd700;
            filter: grayscale(0%) brightness(1);
            z-index: 10;
            animation: rainbow-blink 1.5s infinite alternate;
        }

        .chertog-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            background: rgba(0, 0, 0, 0.5);
        }

        #item-4\.snake .chertog-img {
            object-position: center 15%;
        }

        #item-12\.falcon .chertog-img {
            object-position: 30% center;
        }

        #item-14\.eagle .chertog-img {
            object-position: 40% center;
        }

        #item-16\.virgo .chertog-img {
            object-position: 20% center;
        }

        #item-11\.elk .chertog-img {
            object-position: 65% center;
        }

        #item-3\.swan .chertog-img {
            object-position: 70% center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(8px);
        }

        .modal.visible {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .modal-img-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
            pointer-events: none;
            padding: 60px 20px 20px;
            box-sizing: border-box;
        }

        .modal-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            opacity: 0.25;
        }

        .modal-content {
            background: rgba(15, 5, 25, 0.8);
            padding: 40px;
            border-radius: 15px;
            max-width: 800px;
            margin-top: 50px;
            margin-bottom: 400px !important;
            z-index: 1;
            text-align: left;
            white-space: pre-wrap;
            box-shadow: 0 0 30px #9d4edd;
            line-height: 1.6;
            border: 1px solid #7b2cbf;
            font-size: 1.2em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .close-btn {
            position: fixed;
            top: 20px;
            right: 40px;
            font-size: 60px;
            color: #ffd700;
            cursor: pointer;
            text-shadow: 0 0 20px #e63946;
            z-index: 10;
            transition: transform 0.2s;
            user-select: none;
        }

        .close-btn:hover {
            transform: scale(1.2);
        }

        .shop-links {
            margin-top: 20px;
            display: grid;
            gap: 10px;
        }

        .shop-link {
            display: block;
            padding: 13px 16px;
            border-radius: 12px;
            color: #ffe88f;
            text-decoration: none;
            border: 1px solid rgba(255, 215, 0, .55);
            background: linear-gradient(180deg, rgba(123,44,191,.45), rgba(63,20,103,.58));
            box-shadow: 0 0 12px rgba(157, 78, 221, .4);
            text-align: center;
            font-size: clamp(16px, 2.2vw, 21px);
            font-weight: 700;
            transition: transform .18s ease, box-shadow .18s ease;
            touch-action: manipulation;
        }

        .shop-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 18px rgba(255, 215, 0, .45);
        }

        .audio-control {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(15, 5, 25, 0.7);
            border: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
        }

        .audio-control:hover {
            transform: scale(1.1);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .audio-control svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: #ffd700;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease;
        }

        .audio-control:hover svg {
            stroke: #fff;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.8));
        }

        .audio-control.muted svg {
            stroke: #888;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #7b2cbf, 0 0 20px #7b2cbf, 0 0 30px #eaa8ff, 0 0 40px #fff; }
            to { text-shadow: 0 0 20px #9d4edd, 0 0 30px #9d4edd, 0 0 40px #ffd700, 0 0 50px #fff; }
        }

        @keyframes rainbow-blink {
            0% { box-shadow: 0 0 20px 5px rgba(255, 0, 0, 0.9); border-color: #ff0000; filter: drop-shadow(0 0 15px #ff0000) grayscale(0%); }
            25% { box-shadow: 0 0 30px 10px rgba(255, 255, 0, 0.9); border-color: #ffff00; filter: drop-shadow(0 0 20px #ffff00) grayscale(0%); }
            50% { box-shadow: 0 0 20px 5px rgba(0, 255, 0, 0.9); border-color: #00ff00; filter: drop-shadow(0 0 15px #00ff00) grayscale(0%); }
            75% { box-shadow: 0 0 40px 15px rgba(0, 255, 255, 0.9); border-color: #00ffff; filter: drop-shadow(0 0 25px #00ffff) grayscale(0%); }
            100% { box-shadow: 0 0 30px 10px rgba(255, 0, 255, 0.9); border-color: #ff00ff; filter: drop-shadow(0 0 20px #ff00ff) grayscale(0%); }
        }

        /* Flatpickr стилизация */
        .flatpickr-calendar {
            background: rgba(15, 5, 25, 0.95) !important;
            border: 1px solid #7b2cbf !important;
            box-shadow: 0 0 20px rgba(123, 44, 191, 0.6) !important;
        }

        .flatpickr-months .flatpickr-month {
            background: transparent !important;
            color: #ffd700 !important;
        }

        .flatpickr-current-month input.cur-year,
        .flatpickr-current-month .flatpickr-monthDropdown-months {
            color: #ffd700 !important;
        }

        .flatpickr-weekday {
            color: #9d4edd !important;
        }

        .flatpickr-day {
            color: #fff !important;
        }

        .flatpickr-day:hover {
            background: rgba(157, 78, 221, 0.4) !important;
            border-color: #9d4edd !important;
        }

        .flatpickr-day.selected,
        .flatpickr-day.selected:focus,
        .flatpickr-day.selected:hover {
            background: #9d4edd !important;
            border-color: #ffd700 !important;
            color: #ffd700 !important;
        }

        .flatpickr-day.today {
            border-color: #ffd700 !important;
        }

        /* Планшеты и мобильные (≤768px) */
        @media (max-width: 768px) {
            body {
                background-image: url('chertogs/Kolo.webp');
                background-position: center center;
                background-repeat: no-repeat;
                background-attachment: scroll;
                background-size: cover;
                padding: 8px;
            }

            .header {
                min-width: 90vw;
                width: 95vw;
                padding: 2vh 15px;
                margin-bottom: 2vh;
            }

            h1.mysterious-text {
                font-size: clamp(22px, 5vw, 32px);
            }

            .input-container {
                flex-direction: column;
                align-items: center;
            }

            input[type="text"] {
                width: 80vw;
                max-width: 300px;
                font-size: 18px;
                padding: 12px 15px;
                min-height: 44px;
            }

            .chertog-grid {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: none;
                grid-auto-rows: max-content;
                align-content: start;
                gap: 2vw;
                width: 100vw;
                max-width: 100vw;
                padding: 0 2vw;
                margin: 5vh auto 0;
                height: 50vh;
                overflow-y: auto;
            }

            .chertog-item:nth-child(n+9) {
                margin-top: 0;
            }

            .chertog-item {
                border-width: 2px;
                opacity: 0.25;
                filter: grayscale(60%) brightness(0.7);
            }

            .chertog-item.active {
                transform: scale(1.05);
                position: relative;
                scroll-margin-top: 20vh;
            }

            .modal.visible {
                padding: 0;
            }

            .modal-img-container {
                padding: 70px 15px 80px;
            }

            .modal-img {
                max-height: calc(100vh - 150px);
                opacity: 0.2;
            }

            .modal-content {
                max-width: 95vw;
                width: 95vw;
                margin-top: 60px;
                margin-bottom: 20px !important;
                padding: 20px 15px;
                font-size: 16px;
                line-height: 1.5;
            }

            .close-btn {
                position: fixed;
                top: 10px;
                right: 15px;
                font-size: 48px;
                width: 50px;
                height: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.5);
                border-radius: 50%;
                z-index: 1001;
            }

            .shop-links {
                margin-top: 30px;
                gap: 12px;
            }

            .shop-link {
                padding: 16px 20px;
                font-size: clamp(15px, 4vw, 18px);
                min-height: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #result {
                font-size: clamp(16px, 4vw, 20px);
                padding: 10px;
            }

            .audio-control {
                top: 10px;
                left: 10px;
                width: 40px;
                height: 40px;
            }

            .audio-control svg {
                width: 20px;
                height: 20px;
            }

            .flatpickr-calendar {
                max-width: 90vw !important;
                left: 50% !important;
                transform: translateX(-50%) !important;
            }

            .flatpickr-months .flatpickr-month {
                height: 40px;
            }

            .flatpickr-current-month {
                font-size: 16px;
                padding-top: 8px;
            }

            .flatpickr-weekday {
                font-size: 13px;
            }

            .flatpickr-day {
                font-size: 15px;
                height: 36px;
                line-height: 36px;
                max-width: 36px;
            }
        }

        /* Слабые смартфоны (≤600px) - отключаем тяжелые эффекты */
        @media (max-width: 600px) {
            .mysterious-text {
                animation: none !important;
                text-shadow: 0 0 5px #7b2cbf !important;
            }

            .header {
                box-shadow: 0 0 10px rgba(123, 44, 191, 0.3) !important;
            }

            input[type="text"] {
                box-shadow: 0 0 5px rgba(157, 78, 221, 0.3) !important;
            }

            input[type="text"]:focus {
                box-shadow: 0 0 8px rgba(157, 78, 221, 0.5) !important;
            }

            .chertog-item {
                filter: none !important;
                box-shadow: 0 0 5px rgba(123, 44, 191, 0.3) !important;
            }

            .modal {
                backdrop-filter: none !important;
            }

            .modal-img {
                filter: none !important;
            }

            /* Добавляем will-change для плавных анимаций */
            .chertog-item,
            .modal,
            .modal-img,
            .shop-link {
                will-change: transform;
            }
        }

        /* Мобильные телефоны (≤480px) */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header {
                min-width: 95vw;
                padding: 15px 10px;
                border-radius: 10px;
            }

            h1.mysterious-text {
                font-size: clamp(20px, 6vw, 26px);
                margin: 5px 0;
            }

            label.mysterious-text {
                font-size: clamp(16px, 5vw, 20px) !important;
            }

            input[type="text"] {
                width: 85vw;
                font-size: 20px;
                padding: 14px 18px;
                min-height: 48px;
                border-radius: 10px;
                border-width: 2px;
            }

            .chertog-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: none;
                grid-auto-rows: max-content;
                align-content: start;
                gap: 3vw;
                width: 100vw;
                max-width: 100vw;
                padding: 0 5vw;
                margin: 5vh auto 0;
                height: 60vh;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .chertog-item:nth-child(n+9) {
                margin-top: 0;
            }

            .chertog-item:hover {
                transform: scale(1.02);
            }

            .chertog-item.active {
                transform: scale(1.08);
                border-width: 3px;
            }

            .modal-img-container {
                padding: 60px 10px 70px;
            }

            .modal-img {
                max-height: calc(100vh - 130px);
                opacity: 0.18;
            }

            .modal-content {
                padding: 15px 12px;
                margin-top: 55px;
                border-radius: 10px;
                font-size: 15px;
            }

            .modal-content .shop-links {
                margin-top: 25px;
            }

            .shop-link {
                padding: 14px 16px;
                font-size: 15px;
                border-radius: 10px;
                min-height: 48px;
            }

            .close-btn {
                top: 5px;
                right: 10px;
                font-size: 42px;
                width: 44px;
                height: 44px;
            }

            #result {
                font-size: clamp(15px, 5vw, 18px);
                margin-top: 10px !important;
                min-height: auto;
            }

            .flatpickr-calendar {
                max-width: 95vw !important;
            }

            .flatpickr-months .flatpickr-prev-month,
            .flatpickr-months .flatpickr-next-month {
                padding: 10px;
            }

            .flatpickr-day {
                font-size: 14px;
                height: 32px;
                line-height: 32px;
                max-width: 32px;
            }
        }

        /* Очень маленькие экраны (≤360px) */
        @media (max-width: 360px) {
            .chertog-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: none;
                grid-auto-rows: max-content;
                align-content: start;
                gap: 2vw;
                width: 100vw;
                max-width: 100vw;
                padding: 0 4vw;
                margin: 5vh auto 0;
                height: 70vh;
                overflow-y: auto;
                overflow-x: hidden;
            }

            input[type="text"] {
                width: 90vw;
                font-size: 18px;
                padding: 12px 15px;
            }

            .modal-content {
                padding: 12px 10px;
                font-size: 14px;
            }

            .shop-link {
                padding: 12px 14px;
                font-size: 14px;
            }
        }

        /* Горизонтальная ориентация на мобильных */
        @media (max-height: 500px) and (orientation: landscape) {
            .header {
                margin-bottom: 1vh;
                padding: 1vh 15px;
            }

            h1.mysterious-text {
                font-size: clamp(18px, 4vh, 24px);
            }

            .chertog-grid {
                grid-template-columns: repeat(4, 1fr);
                max-width: 70vh;
                gap: 10px;
            }

            .modal-img-container {
                padding: 50px 20px 20px;
            }

            .modal-img {
                max-height: calc(100vh - 70px);
                opacity: 0.15;
            }

            .modal-content {
                margin-top: 40px;
                max-width: 80vw;
            }

            .close-btn {
                top: 5px;
                right: 20px;
                font-size: 36px;
            }
        }

        /* Дополнительные стили для гарантии применения */
        .modal {
            padding-bottom: 400px !important;
        }
        
        .modal .modal-content {
            margin-bottom: 0px !important;
        }
        
        @media (max-width: 768px) {
            .modal {
                padding-bottom: 0 !important;
            }
        }
    </style>
</head>

<body>
    <!-- Кнопка управления звуком -->
    <button class="audio-control" id="audioControl" title="Увімкнути/вимкнути звук">
        <svg id="audioIconOn" viewBox="0 0 24 24">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <svg id="audioIconOff" viewBox="0 0 24 24" style="display: none;">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
    </button>

    <!-- Аудио элемент - будет создан динамически -->

        <div class="header">
        <h1 class="mysterious-text">Визначи свій Чертог</h1>
        <div class="input-container">
            <label for="birthDate" class="mysterious-text" style="font-size: 1.2em;">Дата народження:</label>
            <input type="text" id="birthDate" readonly inputmode="none" placeholder="Виберіть дату" onchange="calculateChertog()">
        </div>
        <div id="result" class="mysterious-text" style="margin-top:0.3vh; min-height:2vh;"></div>
    </div>

    <div class="chertog-grid" id="grid">
        <!-- JS will populate this -->
    </div>

    <div class="modal" id="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-img-container">
            <img class="modal-img" id="modalImg" src="" alt="">
        </div>
        <div class="modal-content mysterious-text" style="font-size:1.2em; text-shadow:0 0 10px rgba(255,255,255,0.5);"
            id="modalText"></div>
    </div>

    <script>
        // Domain protection disabled for testing

        const chertogDescriptions = {
            "1.boar": "                                                        Чертог Вепря.\n\n У цей час народжуються допитливі та наполегливі люди. Їх відрізняє цілеспрямованість та вміння долати перешкоди. Недоліком є ​​здатність не брати до уваги інтереси інших людей. При цьому вони намагаються бути справедливими та рішучими, наполегливо доносити до інших вірність своїх суджень. Вони звикли досягати наміченого, але можуть допускати надто вільну, розкуту поведінку, якщо не будуть тримати себе в руках. Людям Чертога Вепря завжди слід пам'ятати про силу Небесних Законів. Так само як і Вепр - символ відваги та сміливості, народжені в цей час ставали неординарними людьми. Їхня внутрішня сила була важливою частиною їх характеристики. Навіть якщо зовні людині не дано розміри велетня, то завзятість і цілеспрямованість завжди виділяють їх із натовпу.\nЧертог Вепря насамперед наділяє підопічного силою духу. Вепрі, всупереч своєму грізному покровителю, є досить добрими і миролюбними створіннями. Їм не властиво нападати першими чи бити у спину. Вепр - це скоріше символ сплячої могутності. Але якщо назріває потреба, то ця вн...",
            "2.pike": "Чертог Щуки.\nЧертог Щуки увібрав у себе заступництво відразу двох богородиць: Рожани - богині сімейного достатку та Щуки - цариці річкової та матері водяного духу. Мудрість Одночасно двох божеств займається людьми цього чертога і вносить у характер риси розважливості, доброти і просвітлення. Чертог Щуки отримав свою назву на честь прабатька всього річкового світу.\nОбраз Щуки-чарівниці зберігся до наших часів у міфах та переказах. Широко відома казка про Ємелю та Щуку, яка виконує бажання – яскравий приклад народних оповідей.\nЛюдям, що народилися в цей період, властиве прагнення спокійного, розміреного життя. Основна складність для них – ухвалити важливе рішення. Однак до нових та несподіваних обставин вони легко пристосовуються. Люди чертога Щуки мають здатність ладнати з дітьми, вони добре розуміють поведінку малюків, їхні вчинки та бажання. Гармонія в усьому - у побуті, у душі та свідомості - цього прагнуть ті, хто народився в період Чертога Щуки.\nОднак, за всіх своїх переваг іноді вони можуть бути наївні, надмірно прості і абсолютно беззахисні. У цей час народжують...",
            "3.swan": "                                               Чертог Лебедя.\n\nПредставникам цього чертога, як правило, властива унікальна душевна організація, але також їх відрізняє завидна працьовитість. Вони завжди розраховують тільки на себе і не покладаються на удачу. Крім того, вони мають здатність проникати в таємниці Долі як своєї, так і інших людей. Вони процвітають у землеробстві, вкладають усю душу у свою нелегку працю. Віддають перевагу традиційному життєвому укладу, розміреному і спокійному. Але не завжди вміють ухвалювати рішення. Звичайно, чого не відібрати - це мудрість і проникливий розум Лебедя. Від їх пильного і спостережливого погляду не зможе сховатися жодна дрібниця. Вони помічають усе, що відбувається, але завжди вимовляють вголос свої висновки. Чертог Лебедя наділяє людину прагненням влади, вмінням співпереживати і розуміти чуже горе. Вважається, що люди, народжені в Чертозі Лебедя, мають унікальний дар «дивитися в корінь» будь-якої ситуації.\nЛебеді мають відмінні організаторські здібності, їм важливо впорядковувати навколишнє середовище, робити його зручним і розумним. Їм подо...",
            "4.snake": "                                                Чертог Змія.\n\nНародження в Чертозі Змія передбачає людині світлу, яскраву долю. Представники чертога Змія відрізняються неймовірною активністю, яка спрямовується виключно на добрі справи. Рідко коли побачиш людей-змій, які сидять на одному місці і довго розмірковують про високі матерії. Вони перебувають у постійному русі, який залежно від ситуації та життєвих обставин може бути хаотичним чи впорядкованим. Відмінна риса людей цього періоду – мудрість. Однак у деяких ситуаціях вони схильні виявляти егоїзм та консервативність. Змії, що народилися в Чертозі, дуже комунікабельні, можуть досягти хороших результатів в інформаційній сфері. Також досягають успіху та поваги у сфері знань завдяки вмінню знайти в собі мудрість сил вогню.\nПредставники чертога Змія в коханні зазвичай розбираються краще за інших. Вони трепетно ​​вихваляють високе почуття, що виявляється в їхньому ніжному та дбайливому ставленні до свого обранця. У кохання вони готові поринути в голову, але вимагають такої самовіддачі від партнера. Якщо Змії помітять, що кохана людин...",
            "5.crow": "                                              Чертог Ворона.\n\nЧас Ворона - це період зимового сонцестояння, коли зима сковує всі земні чертоги, природа завмирає і готується битва за відродження Яви. Для слов'ян, як і інших древніх народів, ці дні мали сакральне значення - переможе Світло чи Темрява, чи почне додаватися сонячний день. Чертог Ворона названо на честь речей птаха, символу мудрості та зберігача таємниць. Саме ці якості найбільше простежуються в людях, народжених під час Ворона – вони мудрі, спокійні та цілеспрямовані. Ще час Ворона перебуває під владою бога Коляди. Для слов'ян цей час очікування - чи переможе світло, чи почне додаватися день, чи зменшиться зимова пітьма, чи відродження Весни. Чертог Ворона - час великої битви Темряви та Світла за владу в Яві. Це час, коли бог Коляда перевертає коло, яким йде Сонце. Ім'я Коляди має походження від слова коло. Тобто формально Коляда той, хто веде Сонце по колу, змінює день і ніч, зиму та літо.\nЛюди, що народилися в цьому Чертозі, неординарні, добрі та приємні у спілкуванні. Найчастіше вони можуть налагодити своє сімейне життя до 40 років. Ці лю...",
            "6.bear": "                                                 Чертог Ведмедя.\n\nЛюди, що народилися в цьому Чертозі, - добрі і уважні до оточуючих. Вони наполегливо йдуть до своєї головної мети – ушляхетнити все навколо себе. Вони вміють розпочати справу з нуля та довести її до завершення. Маючи чудову фантазію, вони можуть стати творцями, винахідниками чогось нового як у галузі науки, так і в мистецтві. Притаманні їм риси характеру - хоробрість та мужність.\nЧертог Ведмедя – той час, коли народжуються дуже позитивні, добрі люди. Їх характер, немов із ниток, зітканий із кохання, добра і турботи. Ведмідь, як ясно сонечко, може своєю появою осяяти, бо немає людини, якій він приносить погане.\nЗ дитячої пори у Ведмедів проста, легка вдача, що прагне до знань. Вони неймовірно розумні та наділені величезним потенціалом розвитку.\nДуже старанні до наук, тому здатні досягати яскравих результатів у майбутньому. Але, варто врахувати - їх найголовнішим ворогом є лінощі. Як і сам символ чертога, Ведмідь вносить у характер підопічних свою відому особливість – впадати у сплячку. У людях така риса не має ознак сезонності, вона, ...",
            "7.stork": "                                                   Чертог Бусла (Лелеки).\n\nЛюди, народжені під знаком Бусла (Лелеки), ніжні, в міру емоційні та поступливі. Вони завжди намагаються підтримувати порядок не лише в домі, а й у власних думках, поточних справах і особистих стосунках. За натурою вони спокійні та миролюбні, але якщо їм постійно хтось заважає досягти своїх цілей, Бусл цього не терпітиме і чинитиме гідний опір. Вони надають особливого значення сімейним цінностям, готові на самопожертву заради збереження та покращення сім'ї. Люди, які народилися в цей період, дуже працьовиті. Все, що у них є в житті, — це результат їхньої праці. Вони чуйні, і за першим покликом поспішають на допомогу близьким. Вони можуть зберігати знання, тому вони можуть стати службовцями в історичних фондах чи архівах, хранителями родовідних книг. Особливо добре люди Чертога Бусла здатні зберегти знання та традиції свого роду, повністю передати їх наступним поколінням. Недарма Чертог названий на честь лелеки — птаха, який славиться своєю вірністю дому, родині, пташенятам і партнеру, що обирається раз і на все життя.\n\nТакож...",
            "8.wolf": "                                               Чертог Вовка.\n\nВовкам може бути властива жорсткість, але не жорстокість. Вовки обережні, але не агресивні. Інтроверти, завжди віддадуть перевагу своєму близькому колу або самоті - галасливим компаніям. Уникатимуть конфлікту, поки не станеться справжня загроза.\nНападати на Вовків – собі дорожче, з ними треба жити в мирі. Тоді вони будуть найкращими товаришами.\nВовкам властива рішучість, але вони завжди обережні і часто з презирством ставляться до людей без внутрішнього стрижня. Вони схильні ідеалізувати оточуючих людей, а тому часто розчаровуються у невірності та легковажності людей.\nВовкам властива вірність у стосунках. Чоловіки-вовки відважні, іноді нерозважливі, на перший погляд, але вони завжди знають, чого хочуть. Жінки-вовки рідко бувають старими дівами, переважно вони завжди з партнером.\nНароджені в Чертозі Вовка можуть працювати лікарями, поліцейськими, служити в армії, вони – добрі та чесні журналісти, які поважають факти.\nБог-покровитель Вовка - Велес, дає їм багато умінь у галузі землеробства, ведення домашнього господарства. Так ...",
            "9.fox": "                                               Чертог Лиса (Лисиці).\n\nЧертог Лиса панує в той час, коли весна вступає у свої права – це час загибелі демона Зими та відродження, пробудження духу Весни. У момент весняного рівнодення відбувається чаклунство - відступає Темрява, даючи можливість світлому дню стати довшим. Чертог Лиси отримав назву на честь символу хитрості, розуму, краси та перетворення. Вважалося, що лисиця своїми хитрими хитрощами допомагає духу Весни увійти в права і зміцніти, перемігши сутінки зимового часу.\nЛисиця у слов'янській міфології - персонаж, одягнений неймовірним розумом, здатністю перетворення, хитрістю.\nУ цьому в нього немає чіткого розмежування на позитивне чи негативне значення героя. Лисицю поважали, при цьому побоювалися стати жертвою її прокази. Чертог Лиси приносить в характер людини унікальну властивість пластичності. Лисиці можуть досягати різного становища в суспільстві, потрапляти в будь-які ситуації, але що не забрати - завжди викрутяться, вивернуть все собі на користь. Ця людина неймовірно розумна, прозорлива, цілеспрямована. Ті, хто народився в ць...",
            "10.bull": "                                               Чертог Тура (Бика).\n\nЧертог Тура - знак Сварожого кола, що увібрав всю мудрість і спокій тварини Тура (Бика), який дав чертогу своє ім'я. Над народженими під знаком Тура панує і дбає бог Кришень. Цей бог зберігає Всесвітню вікову Мудрість, Верховний план буття. Під заступництвом Кришеня знаходяться всі арійські та слов'янські обряди, від нього передаються людям знання про прикмети – закони взаємодії матерії в Яві. А надихає своїм духом дерево Осина – дерево руйнування зла, поглинання негативної енергії. Люди цього періоду – ідеалісти за світоглядом, мають підвищене почуття відповідальності. Їх відрізняє підвищена працездатність, але захоплюючись творінням, вони часто забувають про рідних та близьких. Ці люди можуть багато чого досягти, оскільки мають завидну завзятість і працьовитість. Вони здатні щось винаходити, проектувати різні механізми.\nТури, як і тварина, що дає їм назву, напрочуд завзяті і працелюбні. Вони ніколи не поспішають, але водночас вкрай вдумливо та обережно рухаються до наміченої мети. Турам властива чудова організація, вони ...",
            "11.elk": "                                               Чертог Лося.\n\nЧертог Лося невипадково отримав у покровителі богиню Ладу - праматір більшості слов'янських богів і велику захисницю всіх слов'янських племен і родів. Весняне сонце вже повністю увійшло у свою силу, природа розквітла і відродилася у всій красі – той час, коли панують обидві берегині – Лада та Мати-лосиха. Чертог Лося отримав свою назву на честь лісового духу, великої та всесильної власниці звірів Матері-лосихи.\nБудучи символом лісового світу, він може бути привітним для доброї людини або жорстоко покарати того, хто прийшов із поганими намірами. Але якщо людина прийшла вбивати в ліс заради забави, то мати-лосиха може спричинити покарання, заплутавши-закрутивши в лісі, вбивши беззахисного на розтерзання хижим звірам.\nВажливою особливістю, що відрізняє Свароже коло від своїх пізніших аналогів-гороскопів, є божественна сила, яка дає допомогу кожному знаку. Чертог Лося знаходиться під заступництвом богині-богородиці Лади, а поживну силу тим, хто народився в цей час, дає береза. Люди, народжені в цьому Чертозі, відрізняються неймовір...",
            "12.falcon": "                                                Чертог Фініста.\n\nЧертог Фініста – знак у зодіакальній системі праслов'ян. Своє ім'я отримав на честь міфологічного птаха Фініста, який був символом відродження, вічної молодості та безсмертя. У слов'янських казках цей птах носив ім'я Фініст-Ясний Сокіл. Його описували, як птаха з палаючим оперенням червоного і вогненно-золотого кольору, якого неможливо було вбити, у нього була властивість знову відроджуватися з попелу і перемагати будь-яку підлість, зло і чаклунство. Іноді цей міфічний персонаж міг приймати образ молодого хлопця, який приходив у Яв і захищав пригноблених і скривджених людей. Повертав їм віру в добро та справедливість. Ім'я Фініст-ясний сокіл у слов'янській міфології пов'язується з молодим чоловіком напівбожественного походження, який завжди з'являвся у найгостріші моменти нещасть та нападів ворогів. Ці риси – активність, боротьба за справедливість, принциповість, твердість у своїх принципах, а водночас неймовірне життєлюбство та добре розвинений гумор, дістаються народженим під знаком Фініста. Вони, немов той міфічний пта...",
            "13.horse": "                                               Чертог Коня.\n\nчертог коня - дивовижний час, коли активізуються сили різних вимірювань. Пік розквіту природних сил та період літнього сонцестояння, коли сонце та солярні духи, що дають енергію життя, панують у Яві на повну силу. Чертог Коня – час природної сили та пік розквіту всіх стихій. Кінь - символ сили, швидкості, родючості, працьовитості. Він уособлює значення молодої та сильної енергії життя. Цей Чертог символізує значення чоловічої енергетики, вже не юнацької вдалі, а дорослої сили, коли настав час вибрати дружину собі і зробити потомство. Літо, коли всі чертоги святкують силу Сонця – час найбільшої родючості землі. Це час, коли боги Прави приходили на землю, щоб дарувати блага та виконання бажань людям. Люди, що народилися в цей період, мають вміння легко справлятися з різними неприємностями та ударами Долі. Часто з них виходять чудові керівники. Вони здатні легко поєднувати воєдино те, що іншим дається з великими труднощами. Їм подобається процес інтеграції в житті, науці та роботі. Вони люблять земний світ і насолоджуються життям. Але в...",
            "14.eagle": "                                               Чертог Орла.\n\nУ людей Чертога Орла сильно розвинене почуття заступництва і доброзичливість. Ці люди не виявляють слабкості, вони рішучі, особливо коли чітко планують план своїх дій. Вони вміють відбити будь-які атаки: чи то словесні випади на їхню адресу, чи фізичні дії, спрямовані проти них. Людям Чертога Орла корисно займатися практиками на оволодіння силою як у духовній частині, так і у фізичній. Орел вже народжується зі свідомістю своїх сил. Причому це стосується не тільки фізичних, а й інтелектуальних здібностей. Допитливі діти цього чертога змалечку схильні до пристрастей пізнання світобудови. Ними керує ненаситне бажання дізнатися про природу походження будь-яких явищ і предметів. чертог Орла рухає своїх підопічних до нових відкриттів. Орли мають вроджені лідерські якості, але при цьому у них немає місця зарозумілості і пихи. Будучи взірцем сміливості та великодушності, вони з радістю прийдуть на допомогу страждаючим. Рідкісністю для них буває така риса, як меркантильність. Орел не вважає за потрібне відволікатися на матеріальне, вва...",
            "15.white leopard": "                                               Чертог Раса (Рись, Білий Леопард).\n\n\nЛюдей чертога Раса (Рисі, Білого Леопарда) відрізняє цілеспрямованість та розважливість. Однак при цьому вони не завжди здатні брати до уваги думку іншої людини. Вони можуть цінувати те, що дано зверху. Ці люди з раннього дитинства усвідомлюють свою особливу силу та унікальність. Однак вони не повинні забувати про шанобливе ставлення до Бога і матері-природи, які, власне, і є для них головним джерелом життя та енергії. Разом із веселою вдачею та безтурботністю люди чертого Раса виявляють спокій та розважливість у момент розгляду важливих питань.\nЧоловіки, що народилися Чертозі Раса, відповідально ставляться до своїх робочих обов'язків, вони прагнуть виконувати все якісно і вчасно. Їм можна довірити вирішення будь-яких завдань, вони зроблять максимум і обов'язково досягнуть поставленої мети. Для них немає непереборних перешкод, це стійкі та відважні люди. Негативною рисою деяких чоловіків Чертога Раса є егоїстичне ставлення до оточуючих. Вони можуть у цьому сенсі «йти по головах», коли вважають, що обра...",
            "16.virgo": "                                               Чертог Діви.\n\nЦе єдиний Чертог, названий не на честь звіра чи птаха, а присвячений образу людини, її духу (джива - санскрит). Але це не випадково, адже людина є частиною природи і має своє місце у програмі всесвіту. Без людини Яв (земний, світ людей) не мала б сенсу, вона вершина божого задуму. Чертог Діви - знак людей, які прийшли на землю творити. Їхнє найвище призначення зводиться до того, що після них на землі в Яві повинні залишатися плоди праці, думки, матеріальні блага. Тому небеса дарували покровителям цього чертога ті сутності, які дають силу та натхнення у розвиток та множення.\nДжива своєю божественною силою множить міць духу, а дерево яблуня як натхненник надає устремлінням людини матеріальної орієнтації. Тому серед Дів високий відсоток дуже організованих, логічно мислячих представників, котрі всіма силами націлені будувати та творити. Люди, які народилися в цьому Чертозі, дуже цілеспрямовані. Вони прагнуть пізнавати світ, виявляють лідерські якості та впертість. Ці люди мають всі якості лідера, здатні досягати наміченого, вони незалежні ..."
        };

        function init() {
            console.log('init() called');
            const grid = document.getElementById("grid");
            chertogs.forEach(c => {
                const item = document.createElement("div");
                item.className = "chertog-item";
                item.id = "item-" + c.id;
                item.onclick = () => openModal(c.id);

                const img = document.createElement("img");

        function isInChertog(m, d, c) {
            let sm = c.start[0], sd = c.start[1];
            let em = c.end[0], ed = c.end[1];

            if (sm === em) {
                return m === sm && d >= sd && d <= ed;
            } else if (sm < em) {
                if (m === sm && d >= sd) return true;
                if (m === em && d <= ed) return true;
                if (m > sm && m < em) return true;
                return false;
            } else {
                if (m === sm && d >= sd) return true;
                if (m === em && d <= ed) return true;
                if (m > sm || m < em) return true;
                return false;
            }
        }

        function calculateChertog() {
            const val = document.getElementById("birthDate").value;
            if (!val) return;

            const date = new Date(val);
            const m = date.getMonth() + 1;
            const d = date.getDate();

            const activeIds = [];
            const activeNames = [];

            for (let i = 0; i < chertogs.length; i++) {
                const c = chertogs[i];
                const el = document.getElementById("item-" + c.id);
                el.classList.remove("active");
                
                if (isInChertog(m, d, c)) {
                    activeIds.push(c.id);
                    activeNames.push(c.name);
                    el.classList.add("active");
                    
                    setTimeout(() => {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                }
            }

            const resultDiv = document.getElementById("result");
            if (activeIds.length > 0) {
                if (activeIds.length > 1) {
                    resultDiv.innerText = "Ви знаходитесь на межі: " + activeNames.join(" та ");
                } else {
                    resultDiv.innerText = "Ваш чертог: " + activeNames[0];
                }
            } else {
                resultDiv.innerText = "";
            }
        }

            let desc = chertogDescriptions[id] || "Опис тимчасово недоступний.";
            desc = desc.replace(/\n\s*\n/g, '\n\n');

        function closeModal() {
            document.getElementById("modal").classList.remove("visible");

        }

        // ===== АУДИО УПРАВЛЕНИЕ =====
        let bgMusic = null;
        const audioControl = document.getElementById('audioControl');
        const audioIconOn = document.getElementById('audioIconOn');
        const audioIconOff = document.getElementById('audioIconOff');
        const TARGET_VOLUME = 0.4;
        const FADE_IN_DURATION = 2000; // 2 секунды
        const FADE_OUT_DURATION = 1500; // 1.5 секунды
        
        let audioStarted = false;
        let isMuted = false;
        let isPlaying = false;
        let fadeInterval = null;

        // Функция плавного изменения громкости
        function fadeVolume(targetVolume, duration, callback) {
            if (!bgMusic) return;
            
            if (fadeInterval) {
                clearInterval(fadeInterval);
                fadeInterval = null;
            }
            
            const startVolume = bgMusic.volume || 0;
            const volumeDiff = targetVolume - startVolume;
            const steps = 60;
            const stepTime = duration / steps;
            let currentStep = 0;
            
            fadeInterval = setInterval(() => {
                currentStep++;
                const progress = currentStep / steps;
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                bgMusic.volume = Math.max(0, Math.min(1, startVolume + volumeDiff * easeProgress));
                
                if (currentStep >= steps) {
                    clearInterval(fadeInterval);
                    fadeInterval = null;
                    bgMusic.volume = targetVolume;
                    if (callback) callback();
                }
            }, stepTime);
        }

        // Запуск музыки при первом клике
        function startAudioOnFirstClick() {
            if (audioStarted) return;
            audioStarted = true;

            // Создаем и инициализируем аудио объект внутри обработчика клика
            bgMusic = new Audio('slavetnodark.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0;
            
            // Загружаем перед воспроизведением
            bgMusic.load();
            
            const playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    isMuted = false;
                    fadeVolume(TARGET_VOLUME, FADE_IN_DURATION);
                    updateAudioIcon();
                }).catch(err => {
                    console.log('Audio playback failed:', err);
                    audioStarted = false;
                });
            }

            // Удаляем глобальные слушатели после первого запуска
            document.removeEventListener('click', startAudioOnFirstClick, true);
            document.removeEventListener('touchstart', startAudioOnFirstClick, true);
            document.removeEventListener('keydown', startAudioOnFirstClick, true);
        }

        // Вешаем слушатели на первый клик/касание/нажатие
        document.addEventListener('click', startAudioOnFirstClick, true);
        document.addEventListener('touchstart', startAudioOnFirstClick, true);
        document.addEventListener('keydown', startAudioOnFirstClick, true);

        // Кнопка mute/unmute
        if (audioControl) {
            audioControl.addEventListener('click', (e) => {
                e.stopPropagation();
                
                if (!audioStarted) {
                    // Если аудио еще не запущено - запускаем
                    startAudioOnFirstClick();
                    return;
                }
                
                isMuted = !isMuted;
                
                if (isMuted) {
                    bgMusic.muted = true;
                    audioControl.classList.add('muted');
                    audioIconOn.style.display = 'none';
                    audioIconOff.style.display = 'block';
                } else {
                    bgMusic.muted = false;
                    audioControl.classList.remove('muted');
                    audioIconOn.style.display = 'block';
                    audioIconOff.style.display = 'none';
                }
            });
        }

        // Функция обновления иконки
        function updateAudioIcon() {
            if (isMuted) {
                audioControl.classList.add('muted');
                audioIconOn.style.display = 'none';
                audioIconOff.style.display = 'block';
            } else {
                audioControl.classList.remove('muted');
                audioIconOn.style.display = 'block';
                audioIconOff.style.display = 'none';
            }
        }

        // Перехват кликов по ссылкам заказа (fade out перед переходом)
        function handleOrderLinkClick(e) {
            const link = e.currentTarget;
            const href = link.getAttribute('href');
            
            // Только если аудио играет и есть куда переходить
            if (audioStarted && bgMusic && href && href !== '#') {
                e.preventDefault();
                
                // Fade out
                fadeVolume(0, FADE_OUT_DURATION, () => {
                    window.location.href = href;
                });
            }
        }

        // Навешиваем обработчики на ссылки заказа при открытии модалки
        const originalOpenModal = openModal;
        openModal = function(id) {
            originalOpenModal(id);
            
            // Находим все ссылки shop-link и навешиваем обработчики
            setTimeout(() => {
                const shopLinks = document.querySelectorAll('.shop-link');
                shopLinks.forEach(link => {
                    link.removeEventListener('click', handleOrderLinkClick);
                    link.addEventListener('click', handleOrderLinkClick);
                });
            }, 100);
        };

                    },
                    firstDayOfWeek: 1,
                    rangeSeparator: " — ",

                    scrollTitle: "Прокрутіть для збільшення",

                    amPM: ["ДП", "ПП"],

                },
                dateFormat: "Y-m-d",
                altInput: true,
                altFormat: "d.m.Y",

            });
        };

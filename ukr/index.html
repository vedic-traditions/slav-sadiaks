<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слов'янські Чертоги</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/uk.js"></script>
    <link rel="icon" href="data:,">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Marck+Script&family=Ruslan+Display&display=swap');

        :root { color-scheme: dark; }
        
        * { box-sizing: border-box; }
        
        body {
            background-image: url('chertogs/Kolo.webp');
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-color: #050510;
            color: #fff;
            font-family: 'Cinzel', serif;
            text-align: center;
            margin: 0;
            padding: 1vh;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: -2;
        }

        .header {
            margin-bottom: 0.3vh;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.3vh 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 0 30px rgba(123, 44, 191, 0.4);
            min-width: 50vw;
        }

        h1.mysterious-text {
            margin: 0.5vh 0;
            font-size: clamp(24px, 4vh, 40px);
        }

        .mysterious-text {
            font-family: 'Marck Script', cursive;
            color: #ffd700;
            text-shadow: 0 0 10px #7b2cbf, 0 0 20px #7b2cbf, 0 0 30px #c77dff;
            animation: glow 3s ease-in-out infinite alternate;
        }

        label.mysterious-text {
            font-size: 1.2em;
        }

        .input-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        input[type="text"] {
            background: transparent;
            border: 2px solid #9d4edd;
            color: #ffd700;
            font-family: 'Cinzel', serif;
            font-size: clamp(14px, 2vh, 20px);
            padding: 0.5vh 10px;
            width: 250px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.8);
            border-color: #ffd700;
        }

        #result {
            margin-top: 0.3vh;
            min-height: 2vh;
        }

        .chertog-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: 1fr 1.5fr;
            gap: 1vw;
            width: 100vw;
            max-width: 100vw;
            margin: 5vh auto 0;
            padding: 0 2vw;
            height: 40vh;
        }

        .chertog-item {
            width: 100%;
            aspect-ratio: 2/3;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid transparent;
            background: transparent;
            padding: 0;
            opacity: 0.25;
            border-radius: 50%;
            overflow: hidden;
            filter: grayscale(60%) brightness(0.7);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
        }

        .chertog-item:hover {
            transform: scale(1.05);
            opacity: 1;
            filter: grayscale(0%) brightness(1);
            box-shadow: 0 0 20px 5px rgba(157, 78, 221, 0.7);
            border-color: #9d4edd;
        }

        .chertog-item:nth-child(n+9) {
            margin-top: 80%;
        }

        .chertog-item.active {
            opacity: 1;
            transform: scale(1.15);
            border-color: #ffd700;
            filter: grayscale(0%) brightness(1);
            z-index: 10;
            animation: rainbow-blink 1.5s infinite alternate;
        }

        .chertog-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            background: rgba(0, 0, 0, 0.5);
        }

        #item-4\.snake .chertog-img {
            object-position: center 15%;
        }

        #item-12\.falcon .chertog-img {
            object-position: 30% center;
        }

        #item-14\.eagle .chertog-img {
            object-position: 40% center;
        }

        #item-16\.virgo .chertog-img {
            object-position: 20% center;
        }

        #item-11\.elk .chertog-img {
            object-position: 65% center;
        }

        #item-3\.swan .chertog-img {
            object-position: 70% center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(8px);
        }

        .modal.visible {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .modal-img-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
            pointer-events: none;
            padding: 60px 20px 20px;
            box-sizing: border-box;
        }

        .modal-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            opacity: 0.25;
        }

        .modal-content {
            background: rgba(15, 5, 25, 0.8);
            padding: 40px;
            border-radius: 15px;
            max-width: 800px;
            margin-top: 50px;
            margin-bottom: 400px !important;
            z-index: 1;
            text-align: left;
            white-space: pre-wrap;
            box-shadow: 0 0 30px #9d4edd;
            line-height: 1.6;
            border: 1px solid #7b2cbf;
            font-size: 1.2em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .close-btn {
            position: fixed;
            top: 20px;
            right: 40px;
            font-size: 60px;
            color: #ffd700;
            cursor: pointer;
            text-shadow: 0 0 20px #e63946;
            z-index: 10;
            transition: transform 0.2s;
            user-select: none;
        }

        .close-btn:hover {
            transform: scale(1.2);
        }


        .audio-control {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(15, 5, 25, 0.7);
            border: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
        }

        .audio-control:hover {
            transform: scale(1.1);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .audio-control svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: #ffd700;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease;
        }

        .audio-control:hover svg {
            stroke: #fff;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.8));
        }

        .audio-control.muted svg {
            stroke: #888;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #7b2cbf, 0 0 20px #7b2cbf, 0 0 30px #eaa8ff, 0 0 40px #fff; }
            to { text-shadow: 0 0 20px #9d4edd, 0 0 30px #9d4edd, 0 0 40px #ffd700, 0 0 50px #fff; }
        }

        @keyframes rainbow-blink {
            0% { box-shadow: 0 0 20px 5px rgba(255, 0, 0, 0.9); border-color: #ff0000; filter: drop-shadow(0 0 15px #ff0000) grayscale(0%); }
            25% { box-shadow: 0 0 30px 10px rgba(255, 255, 0, 0.9); border-color: #ffff00; filter: drop-shadow(0 0 20px #ffff00) grayscale(0%); }
            50% { box-shadow: 0 0 20px 5px rgba(0, 255, 0, 0.9); border-color: #00ff00; filter: drop-shadow(0 0 15px #00ff00) grayscale(0%); }
            75% { box-shadow: 0 0 40px 15px rgba(0, 255, 255, 0.9); border-color: #00ffff; filter: drop-shadow(0 0 25px #00ffff) grayscale(0%); }
            100% { box-shadow: 0 0 30px 10px rgba(255, 0, 255, 0.9); border-color: #ff00ff; filter: drop-shadow(0 0 20px #ff00ff) grayscale(0%); }
        }

        /* Flatpickr стилизация */
        .flatpickr-calendar {
            background: rgba(15, 5, 25, 0.95) !important;
            border: 1px solid #7b2cbf !important;
            box-shadow: 0 0 20px rgba(123, 44, 191, 0.6) !important;
        }

        .flatpickr-months .flatpickr-month {
            background: transparent !important;
            color: #ffd700 !important;
        }

        .flatpickr-current-month input.cur-year,
        .flatpickr-current-month .flatpickr-monthDropdown-months {
            color: #ffd700 !important;
        }

        .flatpickr-weekday {
            color: #9d4edd !important;
        }

        .flatpickr-day {
            color: #fff !important;
        }

        .flatpickr-day:hover {
            background: rgba(157, 78, 221, 0.4) !important;
            border-color: #9d4edd !important;
        }

        .flatpickr-day.selected,
        .flatpickr-day.selected:focus,
        .flatpickr-day.selected:hover {
            background: #9d4edd !important;
            border-color: #ffd700 !important;
            color: #ffd700 !important;
        }

        .flatpickr-day.today {
            border-color: #ffd700 !important;
        }

        /* Планшеты и мобильные (≤768px) */
        @media (max-width: 768px) {
            body {
                background-image: url('chertogs/Kolo.webp');
                background-position: center center;
                background-repeat: no-repeat;
                background-attachment: scroll;
                background-size: cover;
                padding: 8px;
            }

            .header {
                min-width: 90vw;
                width: 95vw;
                padding: 2vh 15px;
                margin-bottom: 2vh;
            }

            h1.mysterious-text {
                font-size: clamp(22px, 5vw, 32px);
            }

            .input-container {
                flex-direction: column;
                align-items: center;
            }

            input[type="text"] {
                width: 80vw;
                max-width: 300px;
                font-size: 18px;
                padding: 12px 15px;
                min-height: 44px;
            }

            .chertog-grid {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: none;
                grid-auto-rows: max-content;
                align-content: start;
                gap: 2vw;
                width: 100vw;
                max-width: 100vw;
                padding: 0 2vw;
                margin: 5vh auto 0;
                height: 50vh;
                overflow-y: auto;
            }

            .chertog-item:nth-child(n+9) {
                margin-top: 0;
            }

            .chertog-item {
                border-width: 2px;
                opacity: 0.25;
                filter: grayscale(60%) brightness(0.7);
            }

            .chertog-item.active {
                transform: scale(1.05);
                position: relative;
                scroll-margin-top: 20vh;
            }

            .modal.visible {
                padding: 0;
            }

            .modal-img-container {
                padding: 70px 15px 80px;
            }

            .modal-img {
                max-height: calc(100vh - 150px);
                opacity: 0.2;
            }

            .modal-content {
                max-width: 95vw;
                width: 95vw;
                margin-top: 60px;
                margin-bottom: 20px !important;
                padding: 20px 15px;
                font-size: 16px;
                line-height: 1.5;
            }

            .close-btn {
                position: fixed;
                top: 10px;
                right: 15px;
                font-size: 48px;
                width: 50px;
                height: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.5);
                border-radius: 50%;
                z-index: 1001;
            }


            #result {
                font-size: clamp(16px, 4vw, 20px);
                padding: 10px;
            }

            .audio-control {
                top: 10px;
                left: 10px;
                width: 40px;
                height: 40px;
            }

            .audio-control svg {
                width: 20px;
                height: 20px;
            }

            .flatpickr-calendar {
                max-width: 90vw !important;
                left: 50% !important;
                transform: translateX(-50%) !important;
            }

            .flatpickr-months .flatpickr-month {
                height: 40px;
            }

            .flatpickr-current-month {
                font-size: 16px;
                padding-top: 8px;
            }

            .flatpickr-weekday {
                font-size: 13px;
            }

            .flatpickr-day {
                font-size: 15px;
                height: 36px;
                line-height: 36px;
                max-width: 36px;
            }
        }

        /* Слабые смартфоны (≤600px) - отключаем тяжелые эффекты */
        @media (max-width: 600px) {
            .mysterious-text {
                animation: none !important;
                text-shadow: 0 0 5px #7b2cbf !important;
            }

            .header {
                box-shadow: 0 0 10px rgba(123, 44, 191, 0.3) !important;
            }

            input[type="text"] {
                box-shadow: 0 0 5px rgba(157, 78, 221, 0.3) !important;
            }

            input[type="text"]:focus {
                box-shadow: 0 0 8px rgba(157, 78, 221, 0.5) !important;
            }

            .chertog-item {
                filter: none !important;
                box-shadow: 0 0 5px rgba(123, 44, 191, 0.3) !important;
            }

            .modal {
                backdrop-filter: none !important;
            }

            .modal-img {
                filter: none !important;
            }

            /* Добавляем will-change для плавных анимаций */
            .chertog-item,
            .modal,
            .modal-img {
                will-change: transform;
            }
        }

        /* Мобильные телефоны (≤480px) */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header {
                min-width: 95vw;
                padding: 15px 10px;
                border-radius: 10px;
            }

            h1.mysterious-text {
                font-size: clamp(20px, 6vw, 26px);
                margin: 5px 0;
            }

            label.mysterious-text {
                font-size: clamp(16px, 5vw, 20px) !important;
            }

            input[type="text"] {
                width: 85vw;
                font-size: 20px;
                padding: 14px 18px;
                min-height: 48px;
                border-radius: 10px;
                border-width: 2px;
            }

            .chertog-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: none;
                grid-auto-rows: max-content;
                align-content: start;
                gap: 3vw;
                width: 100vw;
                max-width: 100vw;
                padding: 0 5vw;
                margin: 5vh auto 0;
                height: 60vh;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .chertog-item:nth-child(n+9) {
                margin-top: 0;
            }

            .chertog-item:hover {
                transform: scale(1.02);
            }

            .chertog-item.active {
                transform: scale(1.08);
                border-width: 3px;
            }

            .modal-img-container {
                padding: 60px 10px 70px;
            }

            .modal-img {
                max-height: calc(100vh - 130px);
                opacity: 0.18;
            }

            .modal-content {
                padding: 15px 12px;
                margin-top: 55px;
                border-radius: 10px;
                font-size: 15px;
            }


            .close-btn {
                top: 5px;
                right: 10px;
                font-size: 42px;
                width: 44px;
                height: 44px;
            }

            #result {
                font-size: clamp(15px, 5vw, 18px);
                margin-top: 10px !important;
                min-height: auto;
            }

            .flatpickr-calendar {
                max-width: 95vw !important;
            }

            .flatpickr-months .flatpickr-prev-month,
            .flatpickr-months .flatpickr-next-month {
                padding: 10px;
            }

            .flatpickr-day {
                font-size: 14px;
                height: 32px;
                line-height: 32px;
                max-width: 32px;
            }
        }

        /* Очень маленькие экраны (≤360px) */
        @media (max-width: 360px) {
            .chertog-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: none;
                grid-auto-rows: max-content;
                align-content: start;
                gap: 2vw;
                width: 100vw;
                max-width: 100vw;
                padding: 0 4vw;
                margin: 5vh auto 0;
                height: 70vh;
                overflow-y: auto;
                overflow-x: hidden;
            }

            input[type="text"] {
                width: 90vw;
                font-size: 18px;
                padding: 12px 15px;
            }

            .modal-content {
                padding: 12px 10px;
                font-size: 14px;
            }

        }

        /* Горизонтальная ориентация на мобильных */
        @media (max-height: 500px) and (orientation: landscape) {
            .header {
                margin-bottom: 1vh;
                padding: 1vh 15px;
            }

            h1.mysterious-text {
                font-size: clamp(18px, 4vh, 24px);
            }

            .chertog-grid {
                grid-template-columns: repeat(4, 1fr);
                max-width: 70vh;
                gap: 10px;
            }

            .modal-img-container {
                padding: 50px 20px 20px;
            }

            .modal-img {
                max-height: calc(100vh - 70px);
                opacity: 0.15;
            }

            .modal-content {
                margin-top: 40px;
                max-width: 80vw;
            }

            .close-btn {
                top: 5px;
                right: 20px;
                font-size: 36px;
            }
        }

        /* Дополнительные стили для гарантии применения */
        .modal {
            padding-bottom: 400px !important;
        }
        
        .modal .modal-content {
            margin-bottom: 0px !important;
        }
        
        @media (max-width: 768px) {
            .modal {
                padding-bottom: 0 !important;
            }
        }
    </style>
</head>

<body>
    <!-- Кнопка управления звуком -->
    <button class="audio-control" id="audioControl" title="Увімкнути/вимкнути звук">
        <svg id="audioIconOn" viewBox="0 0 24 24">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <svg id="audioIconOff" viewBox="0 0 24 24" style="display: none;">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
    </button>

    <!-- Аудио элемент - будет создан динамически -->

        <div class="header">
        <h1 class="mysterious-text">Визначи свій Чертог</h1>
        <div class="input-container">
            <label for="birthDate" class="mysterious-text" style="font-size: 1.2em;">Дата народження:</label>
            <input type="text" id="birthDate" readonly inputmode="none" placeholder="Виберіть дату" onchange="calculateChertog()">
        </div>
        <div id="result" class="mysterious-text" style="margin-top:0.3vh; min-height:2vh;"></div>
    </div>

    <div class="chertog-grid" id="grid">
        <!-- JS will populate this -->
    </div>

    <div class="modal" id="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-img-container">
            <img class="modal-img" id="modalImg" src="" alt="">
        </div>
        <div class="modal-content mysterious-text" style="font-size:1.2em; text-shadow:0 0 10px rgba(255,255,255,0.5);"
            id="modalText"></div>
    </div>

    
    
  <script src="app.min.js"></script>
</body>

</html>

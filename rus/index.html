<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Калькулятор Чертогов" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0715" />
  <title>Калькулятор Чертогов</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      background-image: url('chertogs/Kolo.webp');
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      background-color: #050510;
      padding: 1vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(40, 15, 65, 0.22), rgba(0, 0, 0, 0.72));
      z-index: -1;
    }
    .header {
      margin-bottom: 0.3vh;
      background: rgba(0, 0, 0, 0.6);
      padding: 0.3vh 20px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0 0 30px rgba(123, 44, 191, 0.4);
      min-width: 50vw;
    }
    .mysterious-text {
      color: #ffd700;
      text-shadow: 0 0 10px #7b2cbf, 0 0 20px rgba(123, 44, 191, 0.9), 0 0 30px rgba(199, 125, 255, 0.65);
      animation: glow 2.8s ease-in-out infinite alternate;
      letter-spacing: 0.2px;
    }
    h1.mysterious-text {
      margin: 0.5vh 0;
      font-size: clamp(24px, 4vh, 40px);
    }
    label.mysterious-text {
      font-size: 1.2em;
    }
    .input-container {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .input-container label {
      font-size: clamp(20px, 3vw, 32px);
    }
    input[type="date"] {
      min-height: 54px;
      min-width: 240px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 2px solid #9d4edd;
      background: rgba(0, 0, 0, 0.25);
      color: #ffd700;
      font-size: clamp(20px, 2.6vw, 27px);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(157, 78, 221, 0.6);
      outline: none;
      font-family: Georgia, "Times New Roman", serif;
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) hue-rotate(180deg) saturate(2); cursor: pointer; }
    #result {
      margin-top: 0.3vh;
      min-height: 2vh;
      font-size: clamp(16px, 3vw, 24px);
    }
    .chertog-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: 1fr 1.5fr;
      gap: 1vw;
      width: 100vw;
      max-width: 100vw;
      margin: 5vh auto 0;
      padding: 0 2vw;
      height: 40vh;
    }
    .chertog-item {
      width: 100%;
      aspect-ratio: 2/3;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 3px solid transparent;
      opacity: 0.25;
      border-radius: 50%;
      overflow: hidden;
      filter: grayscale(60%) brightness(0.7);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
    }
    .chertog-item:hover {
      transform: scale(1.05);
      opacity: 1;
      filter: grayscale(0%) brightness(1);
      box-shadow: 0 0 20px 5px rgba(157, 78, 221, 0.7);
      border-color: #9d4edd;
    }
    .chertog-item:nth-child(n+9) {
      margin-top: 80%;
    }
    .chertog-item.active {
      opacity: 1;
      transform: scale(1.15);
      border-color: #ffd700;
      filter: grayscale(0%) brightness(1);
      z-index: 10;
      animation: rainbow-blink 1.5s infinite alternate;
    }
    .chertog-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      background: rgba(0, 0, 0, 0.5);
      transform: scale(1.08);
    }
    .chertog-img[src*="4.snake"] {
      object-position: center;
    }
    .chertog-img[src*="12.falcon"] {
      object-position: center;
      object-position: 30% center;
    }
    .chertog-img[src*="14.eagle"] {
      object-position: 40% center;
    }
    .chertog-img[src*="16.virgo"] {
      object-position: 20% center;
    }
    .chertog-img[src*="11.elk"] {
      object-position: 60% center;
    }
    .chertog-img[src*="3.swan"] {
      object-position: 77% center;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      overflow-y: auto;
    }
    .modal.visible {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .modal-img-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
      pointer-events: none;
      padding: 60px 20px 20px;
      box-sizing: border-box;
    }
    .modal-img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 0.25;
    }
    .modal-content {
      background: rgba(15, 5, 25, 0.8);
      padding: 40px;
      border-radius: 15px;
      max-width: 800px;
      margin-top: 50px;
      margin-bottom: 400px !important;
      z-index: 1;
      text-align: left;
      white-space: pre-wrap;
      box-shadow: 0 0 30px #9d4edd;
      line-height: 1.6;
      border: 1px solid #7b2cbf;
      font-size: 1.2em;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    .shop-links { margin-top: 20px; display: grid; gap: 10px; }
    .shop-link {
      display: block;
      padding: 13px 16px;
      border-radius: 12px;
      color: #ffe88f;
      text-decoration: none;
      border: 1px solid rgba(255, 215, 0, .55);
      background: linear-gradient(180deg, rgba(123,44,191,.45), rgba(63,20,103,.58));
      box-shadow: 0 0 12px rgba(157, 78, 221, .4);
      text-align: center;
      font-size: clamp(16px, 2.2vw, 21px);
      font-weight: 700;
      transition: transform .18s ease, box-shadow .18s ease;
      touch-action: manipulation;
    }
    .shop-link:hover { transform: translateY(-1px); box-shadow: 0 0 18px rgba(255, 215, 0, .45); }
    .close-btn {
      position: fixed;
      top: 20px;
      right: 40px;
      font-size: 60px;
      color: #ffd700;
      cursor: pointer;
      text-shadow: 0 0 20px #e63946;
      z-index: 10;
      transition: transform 0.2s;
      touch-action: manipulation;
      user-select: none;
    }
    .close-btn:hover { transform: scale(1.2); }
    .audio-control {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 215, 0, 0.5);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1002;
      transition: all 0.3s ease;
      box-shadow: 0 0 12px rgba(157, 78, 221, 0.4);
    }
    .audio-control:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      border-color: rgba(255, 215, 0, 0.8);
    }
    .audio-control svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #ffd700;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .audio-control.muted svg {
      stroke: #9d4edd;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #7b2cbf, 0 0 20px #7b2cbf, 0 0 30px #eaa8ff, 0 0 40px #fff; }
      to { text-shadow: 0 0 20px #9d4edd, 0 0 30px #9d4edd, 0 0 40px #ffd700, 0 0 50px #fff; }
    }
    @keyframes rainbow-blink {
      0% { box-shadow: 0 0 20px 5px rgba(255,0,0,.9); border-color:#ff0000; }
      25% { box-shadow: 0 0 30px 10px rgba(255,255,0,.9); border-color:#ffff00; }
      50% { box-shadow: 0 0 20px 5px rgba(0,255,0,.9); border-color:#00ff00; }
      75% { box-shadow: 0 0 40px 15px rgba(0,255,255,.9); border-color:#00ffff; }
      100% { box-shadow: 0 0 30px 10px rgba(255,0,255,.9); border-color:#ff00ff; }
    }

    /* Flatpickr стилизация */
    .flatpickr-calendar {
      background: rgba(15, 5, 25, 0.95) !important;
      border: 1px solid #7b2cbf !important;
      box-shadow: 0 0 20px rgba(123, 44, 191, 0.6) !important;
    }
    .flatpickr-months .flatpickr-month {
      background: transparent !important;
      color: #ffd700 !important;
    }
    .flatpickr-current-month input.cur-year,
    .flatpickr-current-month .flatpickr-monthDropdown-months {
      color: #ffd700 !important;
    }
    .flatpickr-weekday {
      color: #9d4edd !important;
    }
    .flatpickr-day {
      color: #fff !important;
    }
    .flatpickr-day:hover {
      background: rgba(157, 78, 221, 0.4) !important;
      border-color: #9d4edd !important;
    }
    .flatpickr-day.selected,
    .flatpickr-day.selected:focus,
    .flatpickr-day.selected:hover {
      background: #9d4edd !important;
      border-color: #ffd700 !important;
      color: #ffd700 !important;
    }
    .flatpickr-day.today {
      border-color: #ffd700 !important;
    }

    /* Desktop styles */
    @media (min-width: 1024px) {
      html, body { height: 100%; }
      body {
        height: 100vh;
        overflow: hidden;
        padding: 10px 16px;
        background-size: cover;
      }
      .header {
        margin: 0 auto 10px;
        padding: clamp(10px, 1.6vw, 18px);
      }
      .chertog-grid {
        width: 100vw;
        max-width: 100vw;
        margin: 5vh auto 0;
        padding: 0 2vw;
        height: 40vh;
        gap: 1vw;
        grid-template-rows: 1fr 1.5fr;
      }
    }

    /* Tablets and mobile (≤768px) */
    @media (max-width: 768px) {
      body {
        padding: 8px;
        background-image: url('chertogs/Kolo.webp');
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: scroll;
        background-size: cover;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .chertog-grid { 
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: none;
        grid-auto-rows: max-content;
        align-content: start;
        gap: 2vw; 
        width: 100vw;
        max-width: 100vw;
        padding: 0 2vw;
        margin: 5vh auto 0;
        height: 50vh;
        overflow-y: auto; 
        overflow-x: hidden; 
      }
      .chertog-item:nth-child(n+9) {
        margin-top: 0;
      }
      .chertog-item.active {
        transform: scale(1.05);
        position: relative;
        scroll-margin-top: 20vh;
      }
      .header { 
        min-width: 90vw; 
        width: 95vw; 
        padding: 2vh 15px; 
        margin-bottom: 2vh; 
      }
      h1.mysterious-text { 
        font-size: clamp(22px, 5vw, 32px); 
      }
      .input-container { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        gap: 10px; 
      }
      input[type="text"] { 
        width: 80vw; 
        max-width: 300px; 
        font-size: 18px; 
        padding: 12px 15px; 
        min-height: 44px; 
      }
      .modal.visible { 
        padding: 0; 
      }
      .modal-img-container { 
        padding: 70px 15px 80px; 
      }
      .modal-img { 
        max-height: calc(100vh - 150px); 
        opacity: 0.2; 
      }
      .modal-content { 
        max-width: 95vw; 
        width: 95vw; 
        margin-top: 60px; 
        margin-bottom: 20px !important; 
        padding: 20px 15px; 
        font-size: 16px; 
        line-height: 1.5; 
      }
      .close-btn { 
        position: fixed; 
        top: 10px; 
        right: 15px; 
        font-size: 48px; 
        width: 50px; 
        height: 50px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: rgba(0, 0, 0, 0.5); 
        border-radius: 50%; 
        z-index: 1001; 
      }
      .audio-control { 
        top: 10px; 
        left: 10px; 
        width: 40px; 
        height: 40px; 
      }
      .audio-control svg { 
        width: 20px; 
        height: 20px; 
      }
    }

    
    /* Weak smartphones (≤600px) - disable heavy effects */
    @media (max-width: 600px) {
      .mysterious-text {
        animation: none !important;
        text-shadow: 0 0 5px #7b2cbf !important;
      }

      .header {
        box-shadow: 0 0 10px rgba(123, 44, 191, 0.3) !important;
      }

      input[type="text"] {
        box-shadow: 0 0 5px rgba(157, 78, 221, 0.3) !important;
      }

      input[type="text"]:focus {
        box-shadow: 0 0 8px rgba(157, 78, 221, 0.5) !important;
      }

      .chertog-item {
        filter: none !important;
        box-shadow: 0 0 5px rgba(123, 44, 191, 0.3) !important;
      }

      .modal {
        backdrop-filter: none !important;
      }

      .modal-img {
        filter: none !important;
      }

      /* Add will-change for smooth animations */
      .chertog-item,
      .modal,
      .modal-img,
      .shop-link {
        will-change: transform;
      }
    }

/* Mobile phones (≤480px) */
    @media (max-width: 480px) {
      body { 
        padding: 8px; 
      }
      .header { 
        padding: 8px; 
        border-radius: 14px; 
        min-width: 95vw; 
      }
      h1.mysterious-text { 
        font-size: clamp(20px, 6vw, 26px); 
        margin: 5px 0; 
      }
      label.mysterious-text { 
        font-size: clamp(16px, 5vw, 20px) !important; 
      }
      input[type="text"] { 
        width: 85vw; 
        font-size: 20px; 
        padding: 14px 18px; 
        min-height: 48px; 
        border-radius: 10px; 
      }
      .chertog-grid { 
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: none;
        grid-auto-rows: max-content;
        align-content: start;
        gap: 3vw; 
        width: 100vw;
        max-width: 100vw;
        padding: 0 5vw;
        margin: 5vh auto 0;
        height: 60vh;
        overflow-y: auto; 
        overflow-x: hidden; 
      }
      .chertog-item:nth-child(n+9) {
        margin-top: 0;
      }
      .modal-img-container { 
        padding: 60px 10px 70px; 
      }
      .modal-img { 
        max-height: calc(100vh - 130px); 
        opacity: 0.18; 
      }
      .modal-content { 
        padding: 15px 12px; 
        margin-top: 55px; 
        border-radius: 10px; 
        font-size: 15px; 
      }
      .close-btn { 
        top: 5px; 
        right: 10px; 
        font-size: 42px; 
        width: 44px; 
        height: 44px; 
        z-index: 1001; 
      }
      #result { 
        font-size: clamp(15px, 5vw, 18px); 
        margin-top: 10px !important; 
        padding: 10px; 
      }
    }
  </style>
</head>
<body>
  <!-- Audio element for background music -->
  <!-- Audio element will be created dynamically -->
<!-- Mute/Unmute button -->
  <button class="audio-control" id="muteBtn" type="button" aria-label="Включить звук" title="Включить звук">
    <svg viewBox="0 0 24 24" id="speakerIcon">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" id="soundWave1"></path>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" id="soundWave2"></path>
    </svg>
  </button>

  <div class="header">
    <h1 class="mysterious-text">Определи свой Чертог</h1>
    <div class="input-container">
      <label for="birthDate" class="mysterious-text">Дата рождения:</label>
      <input type="text" id="birthDate" readonly inputmode="none" placeholder="Выберите дату" />
    </div>
    <div id="result" class="mysterious-text"></div>
  </div>

  <div class="chertog-grid" id="grid"></div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="close-btn" id="closeBtn">&times;</div>
    <div class="modal-img-container">
      <img class="modal-img" id="modalImg" alt="" />
    </div>
    <div class="modal-content mysterious-text" id="modalText"></div>
  </div>

  <script>
    // Domain protection disabled for testing
    // if(window.location.hostname!=='vedic-traditions.github.io'&&window.location.hostname!=='localhost')throw new Error("Access denied");
    const chertogDescriptions = {
    "1.boar": "                                                        Чертог Вепря.\n\n В это время рождаются любознательные и настойчивые люди. Их отличает целеустремленность и умение преодолевать препятствия . Недостатком является способность не принимать во внимание интересы других людей. При этом они стараются быть справедливыми и решительными, упорно доносить до других верность своих суждений. Они привыкли достигать намеченного, но могут допускать слишком свободное, раскрепощенное поведение, если не будут держать себя в руках. Людям Чертога Вепря всегда следует помнить о силе Небесных Законов. Так же как и Вепрь - символ отваги и смелости, рожденные в это время становились неординарными людьми. Их внутренняя сила являлась важной частью их характеристики. Даже если внешне человеку не даны размеры великана, то упорство и целеустремленность всегда выделяют их из толпы.\nЧертог Вепря прежде всего наделяет подопечного силой духа. Вепри, вопреки своему грозному покровителю, являются достаточно добрыми и миролюбивыми созданиями. Им не свойственно нападать первыми или бить в спину. Вепрь - это скорее символ спящего могущества. Но если назревает потребность, то эта внутренняя энергия приобретает невероятные масштабы, способные сносить любого врага, как былинку. Вепри редко становятся зачинщиками и агрессорами, чаще их внутренний эгрегор находится в состоянии мирной свинки - поесть, поспать, отдаться сибаритству\nВепри могут быть очень талантливыми людьми - склонность к творчеству хорошо прослеживается у них в характере. Врожденное чувство прекрасного заставляет Вепря пропускать окружающий мир через призму эстетического восприятия. Они достаточно критично относятся к беспорядкам и хаосу, требуя от своего партнера идеальности, граничащего с совершенством, что обычно может отрицательно сказаться на отношениях.\nЧертог Вепря наделяет подопечных отличными интеллектуальными способностями. Эти люди всегда на гребне технологических новинок, впитывают новые знания, постоянно умножают свой запас эрудиции. Благодаря постоянному желанию совершенствования и обучения, часто выходят на самые высокие ступени в обществе.\nВепри - часто однолюбы. Даже если первая любовь заканчивается разводом, затем Вепрю сложно найти себе пару. Их сердце довольно болезненно переживает моменты развода, а рана может долго кровоточить, не давая шансов другим чувствам. Лишь с возрастом, поняв некий смысл мироздания и накопив опыт, Вепри создают тот совершенный союз, о котором мечтали. Ему они потом отдают весь неизрасходованный запас любви, нежности и ожоги, растворяясь в суженном. Можно сказать, что поздние браки для Вепря - благо.\nМужчинам, родившимся в Чертоге Вепря , на протяжении всей жизни сопровождает удача в работе, личных отношениях, в новых начинаниях. Они являются настоящими борцами за справедливость и готовы приложить максимум усилий, чтобы добиться торжества правды над беззаконием. Именно поэтому многие мужчины, рожденные в период Чертога Вепря, склонны выбирать профессии, связанные с юридической или правоохранительной деятельностью. Они становятся успешными адвокатами, востребованными юристами, хорошими полицейскими или спасателями.\nВепри от природы добросовестны, на них можно положиться в тяжелой ситуации, они носят спокойный и уравновешенный характер, мудрость и склонность к творческому мышлению. Благодаря энергичному стремлению к поставленной цели, мужчины Вепри часто занимают ответственные руководящие должности. Женщины, родившиеся в Чертоге Вепря , в первую очередь стремятся обустроить дом, а только потом начинают планировать свой карьерный рост. Доброжелательность к окружающим, правдолюбие, развитое чувство эмпатии и желание помогать нуждающимся делает этих женщин настоящими представительницами Чертого Вепря. Однако по сравнению с мужчинами женщины Вепри отличаются определенной долей таинственности и скрытности, что иногда приводит к чрезмерной замкнутости. Рожденные в чертоге вепря - Вепри могут быть очень талантливыми людьми - склонность к творчеству хорошо прослеживается у них в характере.\n\n                                     Бог-покровитель.\n\nБог Рамхат (Ра, Рас, Брама, Рамх, Рама) - Великий Бог справедливого Небесного суда и Вселенского Правопорядка. Он Небесный Судья, который следит за тем, чтобы не было у Народов Великой Расы и потомков Рода Небесного нарушения кровных заповедей, а также каких-либо запрещенных, кровавых жертвоприношений, не говоря уже о человеческих жертвоприношениях. Бог Рамхат наблюдает, чтобы жизнь людей - на Земле была в соответствии с Законами.\n\n                                   Священное дерево.\n\nГруша - дерево, дающее хорошее настроение. Это очень важно для принятия каких-либо взвешенных решений. Ведь дух , находящийся в смятении, не может объективно воспринимать окружающий мир. Чтобы не случилось, не впадайте в панику - медитация в тени кроны дерева способна сбалансировать энергетические потоки внутри и вне человека. Все тревоги пойдут с отрицательной энергией. К тому же груша - символ плодородия и сытой жизни. Это, конечно, не случайно - славянские племена научились заготавливать плоды дерева. Сушеные, вяленые, копченые на кострах груши были залогом сытой жизни, позволяли людям пережить зимнюю стужу, снабжая организм важными целебными элементами. Самая плодоносная груша в округе возводилась на символ плодородия. Ей посвящали ритуалы, которым призывали на помощь духов природы помочь той женщине, которая не могла родить потомство. Если такое дерево засыхало или умирало, это служило зловещей приметой гибели всего племени. Ждали большой беды природного происхождения - неурожая, голода, моровых болезней или рукотворного, например - войны.\nГруша считалась священным деревом. Южные славяне иногда называли ее деревом любви. Груша считается плодом мудрости и предусмотрительности. Если вам свойственно принимать решение необдуманно, горячая груша окажется вам полезной. Она способствует мышлению и умственному подходу к проблеме. Это ее качество высоко ценилось в древности. Груша всегда считалась плодом мудрецов и философов, кроме того, плоды грушевого дерева были единственной пищей мага перед колдовским ритуалом - так он придавал себе силы мысли и духа и защищал себя от возможного столкновения с дьяволом.\nГруши, съеденные на закате, помогут вам принять правильное решение даже в очень сложной ситуации.\nИз грушевого дерева получаются великолепные магические жезлы.\n\n                                     Священные камни.\n\nДля Чертога Вепр в славянской традиции подходят камни усиливающие решительность стойкость и духовное развитие. К основным минералам относятся аметист, берилл, опал, сапфир и лазурит. Эти камни помогают справиться с упрямством направляя энергию на созидание и мудрое достижение целей. ",
    "10.bull": "                                               Чертог Тура (Быка).\n\nЧертог Тура - знак Сварожьего круга, вобравший всю мудрость и покой животного Тура (Быка), который дал Чертогу свое имя. Над рожденными под знаком Тура властвует и заботится бог Крышень. Этот бог сохраняет Всемирную вековую Мудрость, Верховный план бытия. Под покровительством Крышеня находятся все арийские и славянские обряды, от него передаются людям знания о приметах - законах взаимодействия материи в Яве. А вдохновляет своим духом дерево Осина - дерево разрушения зла, поглощения отрицательной энергии. Люди этого периода - идеалисты по мировоззрению, имеют повышенное чувство ответственности. Их отличает повышенная работоспособность, но увлекаясь творением, они часто забывают о родных и близких. Эти люди могут многого добиться, поскольку обладают завидным упорством и трудолюбием. Они способны что-то изобретать, проектировать разные механизмы.\nТуры, как и животное, дающее им название, удивительно упорны и трудолюбивы. Они никогда не спешат, но в то же время крайне вдумчиво и осторожно двигаются к намеченной цели. Турам свойственна отличная организация, они продумывают до мелочей свои шаги и действия. Одно может затмить их настроение - зависимость от естественных процессов заставляет испытывать перепады давления. Здоровье Туров часто страдает от скачков давления или меланхолии, которые выбивают их из активной жизни.\nТуры часто интроверты, они не любят огромные скопления людей, им свойственно дружеское созерцание общества, но без активного участия в социуме. Они предпочитают узкий круг проверенных друзей вместо шумной толпы, которая их очень быстро утомляет. Ибо те мыслительные процессы, которые постоянно происходят у этих мудрецов, не терпят суеты и препятствий.\nРожденные в Чертоге Тура отличаются удивительно спокойным нравом. Выбирая спутника жизни, создавая семью, они пытаются взвешенно подойти к столь серьезному поступку. Их половинка также должна отличаться спокойным нравом, обладать добротой и мудростью для создания материальных благ. Семейное гнездо для Туров - крепость, которую они свято берегут от постороннего посягательства и вторжения незваных гостей.\nОни очень любят своих чад, которым отдают все свободное от творения и трудов праведных время. В них растворяются всей душой и помыслами, в них видят повод для умиления и радости, ибо своя кровиночка для Туров - свет, сияние, лучик счастья. Туры очень умны с самого юного возраста, с годами только усиливают свой потенциал. Им свойственно глубоко постигать все мыслимые знания, дающие людям науки.\nОбычно у них хорошие способности добиться не только материальных успехов, но и занять в обществе авторитетные позиции. К их мнению и советам прислушиваются широкие массы народа, потому что покров мудрости на светлом главе Туров способствует доверию и уважению.\nМужчины, родившиеся в Чертоге Тура , отличаются мужественным и отважным характером. Если они что-то делают, то стремятся к совершенному, максимально идеальному результату. Это отличные исполнители и верные друзья. Именно поэтому мужчины Чёртого Тура часто выбирают профессию военного или спасителя. Мужчина-Тур напоминает могучую скалу: он неподвижен, пока его не трогают, но сдвинуть его с пути практически невозможно. Тур не ищет легких путей и не верит в «удачу из воздуха». Он готов методично, день за днем, строить свое благополучие. Это те люди, на которых держится любая структура. Несмотря на огромную внутреннюю силу, Тур редко проявляет агрессию первым. Он добродушен, спокоен и даже немного медлителен в принятии решений, так как тщательно все взвешивает. Для него «правильно» важнее, чем «выгодно». Если он видит несправедливость, его гнев будет сокрушительным. Туры чтят традиции, уважают старших и с трудом принимают резкие перемены. Им важна почва под ногами. Женщина рядом с ним чувствует себя в полной безопасности. Он берет на себя все тяжелые задачи: от забитого гвоздя до обеспечения финансовой стабильности. Упрямство - главная проблема в общении с ним. Если Тур что-то вбил себе в голову, переубедить его логикой или слезами почти невозможно. Ему нужно время, чтобы «пережевать» информацию и самому прийти к новому выводу. Под внешней суровостью скрывается очень нежная натура. Он ценит домашний уют, вкусную еду и телесный комфорт.\nЖенщины, родившиеся в Чертоге Тура , стремятся к новым знаниям и умеют передавать их другим людям. Поэтому они часто реализуют себя в преподавательской деятельности или воспитании детей. Их целеустремленность и ответственность дают возможность добиться потрясающих результатов на этом поприще. Женщины Чертога Тура особое внимание уделяют отношениям в семье и трепетно оберегают дом. Они обладают всеми качествами для создания идеальных условий для гармоничного существования. Они верные, любящие жены, и никогда не позволят себе предать или обмануть любимого человека.\nЛюди из Чертога Тура обладают завидным упорством и трудолюбием.\n\n                                            Бог Покровитель.\n\nБог Крышень - одно из имен славянского Бога. Встречаются также другие интерпретации его имени. Крышань, Крышн - у западных славян, Кресень или Крышень - у северных славян.\n\n                                                Священное Дерево.\n\nДерево удивительной силы, способное бороть колдовство без остатка. Попадая под покров дрожащих листьев осины, всякое зло и магия теряли свои способности. Своим подопечным осина часто давала возможность защищать людей от любого магического действа, поэтому часто Чертог Тура даровал людям волхвов, наделенных знаниями и способностями противостоять Навьим подвохам (Навь - темнота, смерть, темная сторона жизни, Яви).\nЧтобы пополнить свои силы и особенно очистить ауру от зла, завистливых взглядов, порчи, Турам достаточно было прижаться всем телом к своей вдохновительнице - Осине.\nРожденные под знаком с такой покровительницей всегда с легкостью могли избавиться от любой приведенной болезни. Осина способна забирать, снимать с человека всякий недуг и нести его в землю из-за своих корней.\nСреди Туров очень много тех, кто, взаимодействуя с силами природы, причем не всегда хорошими, рискует получить магический удар, потому что очень отзывчив к любым энергиям и явлениям. В таком случае вдохновительница осина поможет, будучи талисманом. Лучший оберег для Тура делают из осиновой древесины.\nОбщение с осиной помогает при нервозных состояниях, навязчивых мыслях, беспричинном страхе. В магии осина считается деревом, отводящим смерть. Она способствует проявлению внутренних лечебных сил человека, что обеспечивает доступ к нашей подлинной сущности, иногда скрытой под обманчивой внешней оболочкой. Однако слишком долго контактировать с ней не стоит, можно потерять много полезной энергии.\nОсина, посаженная в саду или поле, оберегает от воров.\n\n                                                  Священные камни.\n\nКамни чертога Тура призваны усиливать трудолюбие, стойкость и душевную теплоту, свойственные людям этого знака. Основными обережными минералами считаются изумруд, агат (особенно белый) и кахолонг, которые помогают принимать взвешенные решения и сохранять внутреннюю гармонию.",
    "11.elk": "                                               Чертог Лося.\n\nЧертог Лося не случайно получил в покровители богиню Ладу - праматерь большинства славянских богов и большую защитницу всех славянских племен и родов. Весеннее солнце уже полностью вошло в свою силу, природа расцвела и возродилась во всей красе - то время, когда царят обе берегини - Лада и Мать-лосиха. Чертог Лося получил свое название в честь лесного духа, великой и всесильной обладательницы зверей Матери-лосихи.\nБудучи символом лесного мира, он может стать приветливым для доброго человека или жестоко наказать того, кто пришел с плохими намерениями. Во власти Матери-лосихи проявить милость и помочь лесным дарам охотнику, заблудившемуся в поисках добычи.Но если человек пришел убивать в лес ради забавы, то мать-лосиха может навлечь наказание, запутав-закрутив в лесу, убив беззащитного на растерзание хищным зверям.\nВажной особенностью, отличающей Сваржий круг от своих более поздних аналогов-гороскопов, является божественная сила, дающая помощь каждому знаку. Чертог Лося находится под покровительством богини-богородицы Лады, а питательную силу родившимся в это время дает береза. Люди, рожденные в этом чертоге, отличаются невероятной выносливостью, общительностью и любвеобильностью. Однако им бывает сложно довериться незнакомому человеку, они не верят никому и ничего не принимают на слово. При этом они ценят прекрасное, изо всех сил стремятся постичь искусство красоты и искусство любви. Их сердца всегда наполнены чувственностью, нежностью и романтикой. Они могут помочь другим найти верный путь к любви, наладить отношения между родными и близкими.\nЛюди Чертога Лося очень ценят умение уважать чувство другого человека. Это время, когда на землю приходят добрые и добрые люди. Знак Лося привносит в характер такие качества, как трудолюбие, доброту, покой, упорство.\nЛоси редко бывают злопамятны, обычно они умеют отпускать. Будучи достаточно прямолинейными, не держат в себе эмоции - прямо говорят о том, что думают.\nЛоси - активные экстраверты, им свойственно заполнить собой все пространство. Такой человек обязательно делится своими эмоциями, переживаниями, наблюдениями и выводами со всем миром. Признание и внимание окружающих ему необходимо как воздух. Если случается вынужденное отшельничество, то Лось будет чувствовать себя совсем несчастным. Только находясь в бурном потоке событий, он живет и активно подпитывает свою энергетику.\nНельзя назвать этих людей усидчивыми интеллектуалами, скорее это знак людей-тружеников, творцов, всех пришедших на землю оставить после себя ощутимые богатства.\nЭтим людям не свойственно врать. Они не умеют лгать и внутренне не готовы к какому-либо проявлению лжи. Лось несколько наивно всех людей меряет собственной меркой, но мир не столь добр, поэтому он, столкнувшись с завистью, ложью или подлостью, впадает в уныние. Реакция Лося не заставляет долго ждать - плохих людей выносит за пределы своего общения без надежды возобновления отношений. Порой такая категоричность становится причиной разводов и ссор в семье.\nЛось - ответственный семьянин, где на первом месте для него находится счастье и благополучие домочадцев, богатство и сытость близких.\nМужчины, родившиеся в Чертоге Лося , прямолинейны абсолютно во всем, даже тогда, когда речь заходит о романтических отношениях. Им свойственно убеждать окружающих в своей правоте, и они очень коммуникабельны. Их развитый разум позволяет им с легкостью воздействовать на окружающих с помощью слов, они могут стать прекрасными ораторами, руководителями, лидерами. Однако такое случается нечасто, поскольку мужчины Чертога Лося склонны к беззаботной жизни, их тяготят любые правила и условности. К выбору спутницы жизни они относятся очень ответственно, и обычно не спешат первыми делать шаг к сближению.\nЖенщины, родившиеся в Чертоге Лося , могут много времени провести в поисках спутника жизни, поскольку постоянно разочаровываются в людях, то снова открывают в себе веру в них. Они редко верят кому-то на слово, и тот , кого они плохо знают, никогда не сможет стать для них авторитетом. Иногда женщины Чертога Лося бывают склонны к нервным расстройствам, поскольку часто и многое переживают по поводу работы, здоровья родных, успехов своих детей. В то же время, женщины Чертога Лося стремятся сами выполнять свои обязанности, поскольку считают, что если человек хочет, чтобы работа была проделана хорошо, он должен сделать ее сам.\n\n                                               Бог Покровитель.\n\nЧертог Лося не случайно получил в покровителе богиню Ладу - праматерь большинства славянских богов и большую защитницу всех славянских племен и родов. Весеннее солнце уже полностью вошло в свою силу, природа расцвела и возродилась во всей красе - то время, когда царят обе берегини - Лада и Мать-лосиха.\n\n                                               Священное Дерево.\n\nБереза - важное дерево в энергетике славянского народа. Ему отдают право сохранять целебную энергию, питающую любого Русича. Невероятная красота этого дерева стала вдохновением для создания бесконечного числа легенд, проникнутых любовью к березе. Описание березы, вероятно, самое лирическое из всего ряда тотемных символов. Ей приписывают покровительство здоровью всякого, в чьих жилах течет славянская энергетика. Она символ любви, красоты и молодости.\nБереза считалась самым сильным растением для избавления от недугов. Даже банный березовый веник - неслучайный предмет. Обряд омывания в бане с применением березовых ветвей не что иное, как врачебный обряд, призванный вернуть силу духа в тело и жизненную энергию любому.\nКроме этого, береза помогала в избавлении от болезней детям. В тени ее листья оставляли ребенка играть, чтобы матушка-береза забрала его недуг.\nНа праздник Лады было принято привязывать к веткам дерева разноцветные ленты. Приговаривая мысленно желания, девушки и женщины просили у березы исполнения своей мечты.\nТакже существует обряд, описывающий выметание зла из своего дома веником из березовых прутьев. До сих пор сохранился обычай - на Троицу выбрасывать зло из дома березовыми ветвями. Это дошедший до нас древний обычай славян помогает избавиться от колдовского мусора в своем жилище.\nРовным, мягким, спокойным, но вместе с тем полноценным потоком льется энергия березы, но со всеми делится энергетикой наша красавица. Потоками силы она одаряет только тех, чья душа открыта для Света.\nГоворят, что растущая возле дома береза отгоняет от его обитателей кошмарные сны. Родители наши называли белоствольную красавицу - деревом Жизни и наделяли ее магическими и целительскими силами и верили в ее божественное происхождение.\nСуществует поверье, что в первой половине мая береза имеет наибольшую исцеляющую силу. В это время можно собрать ее сок и поить неизлечимых и слабых людей, чтобы те быстрее вылечились и восстановили силы. У каждого дерева обязательно просили разрешение и с одного брали около литра сока. Потом благодарили и извинялись, обрабатывали рану смолой. Дерево донора больше не трогали до следующего года и ветки с него не обрезали.\nНа бересте пишут чернилами из дубовых орешков и пером из крыла ворона рунические заклинания. Также защищает дом и домочадцев от удара молний. Из березового дерева делали люльки для новорожденных.\n\n                                                     Священные камни.\n\nЛучшими натуральными камнями-талисманами считаются агат, изумруд и нефрит, которые помогают раскрыть созидательную энергию, свойственную этому знаку.",
    "12.falcon": "                                                Чертог Финиста.\n\nЧертог Финиста - знак в зодиакальной системе праславян. Свое имя получил в честь мифологической птицы Финиста, которая была символом возрождения, вечной молодости и бессмертия. В славянских сказках эта птица носила имя Финист-Ясный Сокол. Ее описывали, как птицу с пылающим оперением красного и огненно-золотого цвета, которую невозможно было убить, у нее было свойство вновь возрождаться из пепла и побеждать всякую подлость, зло и колдовство. Иногда этот мифический персонаж мог принимать образ молодого парня, который приходил в Явь и защищал угнетенных и обиженных людей. Возвращал им веру в добро и справедливость. Имя Финист-ясный сокол в славянской мифологии связывается с молодым человеком полубожественного происхождения, который всегда появлялся в острейшие моменты несчастий и нападений врагов. Эти черты - активность, борьба за справедливость, принципиальность, твердость в своих принципах, а вместе с тем невероятное жизнелюбие и хорошо развитый юмор, достаются рожденным под знаком Финиста. Они, словно та мифическая птица, даже встретив на своем пути опасность, не унывают, а активно преодолевают препятствие и не теряют присутствия духа. Свое имя этому чертогу подходит как никакое другое - вечная борьба и вечная жизнь. Хотя название священного дерева Финиста - Вишни и созвучно имени бога-покровителя Финиста - Вышеня, они наделяют подопечного кардинально разными свойствами. От одного Финисты приобретают острый и проницательный ум, а от вишни им достается романтическая, чувственная натура, очень веселая и активная.\nЛюдей этого периода отличает невероятная энергия , они стремятся делать сразу несколько дел. Их недостатком можно считать склонность к резким изменениям настроения. Эти люди обладают хорошей памятью и смекалкой, способностью смягчать конфликты и разногласия. Развивая свои силы, они начинают быстро распознавать правду и ложь, мгновенно понимая, когда их пытаются обмануть. Люди Чертога Финиста способны научить других видеть истину даже во времена всеобщего обмана.\nФинист - человек невероятной активности. Его сил хватает, чтобы заменить целое сообщество. Такой работник способен работать за троих, причем кажется, будто он не устает, а все больше увлекается процессом.\nЭто знак очень импульсивных людей, способных совершенно разноплановые поступки. С одной стороны, они могут вникать в очень сложные науки, достигать невероятных высот, могут заряжать своим позитивом и оптимизмом. Но с другой стороны, тот , кто попадает к ним в немилость, рискует познать обратную сторону Звездного Сокола - критику, резкость слов и некоторую жестокость. Финистам свойственно требовать от людей большего, чем следует. Но их нельзя считать жестокосердными, им свойственно бескорыстно откликаться на призывы о помощи.\nВ имени Финиста скрыт огромный потенциал, двигающий людей на свершение - поступки, от которых выигрывает человечество. Под влиянием Чертога Финиста рождаются люди, стремящиеся изменить сразу весь мир. Такая активность иногда становится не очень удобным качеством для тех, кто рядом с ними.\nФинисты никогда не сдаются, обладая прекрасными аналитическими способностями, они умеют планировать и вырабатывать стратегию достижения цели.Единственное, что может их свернуть с избранного пути - это любовь. Не зря в русской мифологии Сокол имеет прообраз молодого парня, который, совершив ряд подвигов, обретает свою паву, а затем обязательно берет в жены. Это полностью соответствует характеру финистов - свернуть горы, победить зло и жениться. Женщины, родившиеся в Чертоге Финиста , обладают хорошо развитой интуицией, подсказывающей им оптимальные решения в сложных жизненных ситуациях. Иногда они могут показаться окружающим довольно спорными и загадочными натурами, но это обманчивое впечатление. Для близких и друзей они всегда открыты и не пытаются показать себя лучше, чем они есть. Женщины Чертога Финиста - лица творческие, они всегда тщательно двигаются к идеальному завершению любого дела. \nМужчины, рожденные в Чертоге Финиста - это люди невероятного полета, оптимизма и неуемной энергии. Мужчина-Финист - это вечный двигатель. Он не может долго находиться в покое, его ум и тело всегда требуют новой цели. Это те люди, которые могут делать пять дел одновременно и при этом насвистывать мелодию. У них феноменальная скорость реакции и мышления. Финисты верят в высокие цели. Они часто становятся первопроходцами, исследователями или реформаторами, потому что их не устраивает «как у всех». Финист - это мифическая птица (прообраз Феникса). Как бы больно он ни упал, он отряхнет перья, извлечет урок и взлетит еще выше. Рутина для него губительна. Если в жизни Финиста долго ничего не меняется, он начинает чахнуть или сам провоцирует «бурю», чтобы встряхнуться. Он умеет красиво ухаживать, совершать безумные поступки и вдохновлять. Женщины часто влюбляются в его внутреннюю свободу. Несмотря на влюбчивость в юности, зрелый Финист ищет «ту самую», которая поймет его духовные поиски. Если он ее находит, он будет защищать ее интересы яростнее любого другого знака. С детьми он на одной волне. Он скорее пойдет с ними в поход или научит запускать ракеты, чем будет проверять уроки за столом. Благодаря покровительству Вышня, они могут стать глубокими философами или коучами.\nЕсли мужчина-Финист - это стремительный сокол, то женщина Чертога Финиста - это настоящая волшебница, наделенная невероятной интуицией и способностью видеть мир в ярких красках. Такая женщина живет чувствами и озарениями, она легка на подъем, но при этом обладает стержнем, который не дает ей сломаться под грузом обстоятельств. Женщина-Финист - это вечное движение. Она не терпит застоя ни в делах, ни в мыслях. Даже в самой темной полосе жизни она найдет искру света. Она способна заражать своей верой в лучшее всех окружающих. Она не просто делает работу - она ее «творит». Будь то приготовление ужина или написание годового отчета, в этом всегда будет её уникальный почерк. Ей жизненно необходимо менять обстановку. Перестановка мебели, новый цвет волос или внезапная поездка на выходные - это её способы перезагрузки. Благодаря Вышню, она часто «знает» вещи, которые нельзя объяснить логикой. Ей снятся вещие сны, или она просто чувствует, стоит ли доверять человеку. Обыденная семейная жизнь «дом-работа-телевизор» для нее губительна. Она будет той женой, которая предложит устроить пикник на полу в гостиной или сорваться в горы ночью. Она не «наседка». С детьми она общается как с личностями, поощряя их таланты и фантазию. Её дети часто растут очень самостоятельными и творческими. Ей важно иметь свои интересы вне семьи. Уважая её право на «свое небо», мужчина получит самую верную и интересную спутницу.\n\n                                                    Бог Покровитель.\n\nБог Вышень является Богом-Покровителем Чертога Финиста. Вышень строг по отношению к тем, кто стремится исказить Правду, выдавая Черное за Божественное. Но при этом Он добр к тем, кто соблюдает Небесные Законы Мироздания и не позволяет другим нарушать их. Он помогает стойким побеждать в борьбе с темными силами, которые несут во все Миры зло и невежество, лесть и обман, желание чужого и унижение одного живого существа другим.\n\n                                                    Священное Дерево.\n\nВишня имеет большое значение в жизни людей, как дерево молодости. Своим весенним цветом, от которого внутри душа расцветает, а сердце выпрыгивает от навалившейся любви, вишня приносит чувство счастья, высочайшего блаженства. Майское тепло, зелень плавно перетекают под ласковое июньское солнышко, чтобы одарить нас красными плодами из дерева любви.\nСчиталось, что человек, посадивший вишню, получал покровительство могущественного Бога Вышеня, во власти которого было не только посылать богатые урожаи, беречь здоровье, уберечь от плохого глаза, но и управлять судьбой и событиями жизни человека.Бог Вышень благоволил только тем, кто умел чтить и следовать традициям своих предков. Только человеку творческому, честному, идущему по пути образования и самосовершенствования, он помогал наполнить душу истинным светом, сердце - исцеляющей любовью, а мысли - прозрением.\nВозможно, поэтому у славян, вишневые деревья садились при входе в новый дом, свадьбе, рождении ребенка, они верили, что если соблюдать и уважать законы предков, то самые трудные моменты можно было просить о помощи и защите у деревца, посаженного у дома.\nСуществовал обычай, сделать палку или палку из вишневого деревца, глубоко верили, что он имеет особую магическую и целебную силу, передаваемую от дедушки к отцу, от отца к сыновьям. Человек не умирает, пока вишневые деревья продолжают жить для него.\nВесной цветущие деревца вишни украшали зажженными свечами, а сама вишня считалась ритуальным деревом новогоднего весеннего обряда. Если задуматься над фразой и предположить, что: «Построить дом, родить сына, посадить дерево» - не просто крылатое выражение или гипербола, а именно многовековой охранный ритуал с посадкой вишневого дерева и весь жизненный путь человека, как в своем развитии, так и на протяжении Рода и самой жизни на Земле. Пусть в ваших сердцах любое время года цветет вишня!\nЕсли вы стали жертвой энергетического вампира или просто устали, включите в свой рацион вишню. Она поможет вам избежать усталости и избавиться от напряжения, а красный цвет вишни - символ горячей крови и солнечного тепла. Вишни, которые вы сорвете своей рукой на рассвете, подарят вам чувство счастья и полноты жизни. Если же вы сорвете вишни в ночь, когда Луна окружена красным облаком, то будете всю жизнь стремиться к поставленной цели и в результате достигнете желаемого. Вишня превратит вас в неуязвимого для происков врагов. К тому же она поможет вам сделать карьеру.\n\n                                                  Священные камни.\n\nКамнями-талисманами для Чертога считаются натуральные камни, способствующие раскрытию талантов, защите и усилению мудрости. К основным камням относятся рубин, изумруд, гранатагат и гематит. Часто используются в сочетании с серебряными оберегами.",
    "13.horse": "                                               Чертог Коня.\n\nЧертог коня - удивительное время, когда активизируются силы разных измерений. Пик расцвета природных сил и период летнего солнцестояния, когда солнце и солярные духи, дающие энергию жизни, господствуют в Яве в полную силу. Чертог Лошади - время природной силы и пик расцвета всех стихий. Конь - символ силы, скорости, плодородия, трудолюбия. Он олицетворяет значение молодой и сильной энергии жизни. Этот Чертог символизирует значение мужской энергетики, уже не юношеской вдали, а взрослой силы, когда пора выбрать жену себе и сделать потомство. Лето, когда все Чертоги празднуют силу Солнца - время величайшего плодородия земли. Это время, когда боги Правы приходили на землю, чтобы даровать блага и исполнение желаний людям. Люди, родившиеся в этот период, обладают умением легко справляться с различными неприятностями и ударами Судьбы. Часто из них получаются отличные руководители. Они способны легко сочетать воедино то, что другим дается с большим трудом. Им нравится процесс интеграции в жизни, науке и работе. Они любят земной мир и наслаждаются жизнью. Но они должны быть осмотрительными, чтобы не настроить себя только на земные идеалы, обходя духовные.\nРазвиваясь духовно, люди Чертога Лошади способны сочетать в себе проявление сил всех стихий, познать суть Тьмы и Света. Подобно своему покровителю Купале, рожденные в Чертоге Лошади обладают ярко выраженной романтичностью. Это очень эмоциональные люди, тонко воспринимающие мир. Пребывая в постоянном сомнении, они критически относятся к происходящему вокруг, за что иногда неверно воспринимаются другими.\nВ Чертоге Лошади рождаются те, кто с избытком наделен творческим вдохновением. Их богатый, насыщенный образами мир часто становится залогом успешной реализации себя в области искусства - художники, актеры, музыканты.\nЛошади - добрые, отзывчивые, но одновременно и очень уязвимые люди. Их оскорбляет невнимание к их персоне, ведь они чаще всего пытаются помочь каждому нуждающемуся. Склонны переживать и страдать, если сталкиваются с хамством и резкостью. Ведь сами они по натуре довольно мягкие и покладистые.К тому же в этом Чертоге рождаются те, кто с детства проявляет стремление к расширению своих знаний.\nСильные стороны Лошади - эрудированность, умение быстро анализировать ситуацию, генерировать разные планы и успешно их воплощать в жизнь. Единственное, порой портящее им воплощение мечты в реальность - невероятная неуверенность и нерешительность.\nЧертог Лошади - знак очень трудолюбивых людей, осознающих зависимость получения материальных благ от стараний в работе. Но их нельзя назвать очень меркантильными лицами, скорее они стремятся извлекать обильные плоды от труда своего, но со всей щедростью и не жалея, могут разделить результат с ближним. Им не свойственно жадно накапливать богатства, скорее успех - тот маркер, который радует их самолюбие.\nЧрезвычайно падки на лесть. Для Лошади имеет значение - какое признание и резонанс в обществе вызывает его действие. Поэтому Лошади часто становятся жертвами подхалимов и лжецов, что невероятно их ранит.\nОсобой верностью Лошади не отличаются. Конечно, не без исключений, но часто молодость их полна всяких романтических похождений и историй любви. Сами они становятся причиной слез и душевных страданий других. Лишь с годами, насытившись свободной жизнью, склонны связывать себя узами брака. Зато потом стараются сохранять верность супругам и ценят семейный уют и теплоту.\nМужчины, родившиеся в Чертоге Лошади , добрые, положительные, умные, отличаются необычной физической силой и горячим темпераментом. Они могут разозлиться даже по незначительному поводу, но быстро отходят. Они очень ответственны, в любом случае выполняя возложенные на них обязательства, но вопрос всегда упирается в их личную заинтересованность. Эти мужчины никогда не будут работать из-под палки. Если они берутся за то только потому, что так надо, то вряд ли такое дело будет завершено. Женщины, родившиеся в Чертоге Коня , казалось бы, могут показаться романтическими личностями, витающими в облаках. Вместе с тем они талантливы, тонко ощущают окружающий мир и людей, находящихся рядом с ними. Они любят безгранично и преданно, но так же яростно умеют и ненавидеть, хотя совсем не мстительны и легко забывают обиды. В большинстве случаев женщины Лошади предпочитают все свободное время уделять семье и подрастающему поколению. Но некоторые из них ставят первое место карьеру, и тогда они могут долгое время оставаться в одиночестве. \n\n                                                     Бог Покровитель.\n\nКупала - Бог, дающий человеку возможность сотворить любые Оговорки и проводить Обряды Очищения Телес, Души и Духа от различных болезней-болезней. Бог, наставляющий на радостную и счастливую жизнь. Купала - веселый и прекрасный Бог, одевающийся в легкие белые одеяния, украшенные цветами.\n\n                                                     Священное дерево.\n\nВяз - дерево священное. В его кроне связывают и все плохое ему сбрасывают. Из вязовой древесины часто делали обереги для дома, пресловутые «петушки», украшавшие крышу для защиты от пожара, коньки - лошадиные головы, которые должны были отгонять злые силы от дома и хозяйства. Словом, вяз почитался как дерево-защитник, дерево-воин. В средневековье рыцари делали из вяза копья не только из-за крепости древесины. Считалось, что вязовые копья внушают воину отвагу и приносят удачу в битве.\nЭто дерево подлинных душевных качеств настоящего мужчины. Именно таким людям вяз помогает не отчаиваться в неудачах, помогает с достоинством снести поражение. Вяз не симпатизирует неудачникам, он не терпит разгильдяйства, готовности махнуть на все рукой. Только тому, кто готов снова подниматься каждый раз, несмотря на трудности, в сотый раз начинать все сначала, вяз дает силы. Иногда одного хорошего контакта с вязом человеку может хватить долгие годы.\nЕсли вы изнемогаете в борьбе, если вам не хватает соломинки, чтобы удержать равновесие - именно крепкая вязовая ветвь с радостью даст за себя ухватиться и поможет выбраться к свету.\nВ магии вяз привносит в заклятие стойкость и сопротивление.\nЗаботится также о сильных и особенно одиноких женщинах. Из-за того, что в последнее время, да и не только, всегда были женщины, которые несли большее бремя ответственности за себя и семью, чем мужчины. В этом случае оно может наказывать мужчин, из-за которых женщина оказывается в столь сложной жизненной ситуации. Однако дама должна быть действительно очень крутой, чтобы получить его расположение. В таком случае она становится еще более мощной. Сжигайте и используйте в мешочках-талисманах, чтобы избавить себя от вредного вмешательства . Вязу по силам избавить вас от кривотолков и сплетен.\n\n                                                     Священные камни.\n\nКамнями-талисманами для Чертога Коня в славянской традиции считаются янтарь, аметист, дымчатый кварц и топаз. Они приносят гармонию, силу и оберегают от негатива. Часто обереги выполняются из балтийского янтаря в серебре.",
    "14.eagle": "                                               Чертог Орла.\n\nУ людей чертога Орла сильно развито чувство покровительства и доброжелательность. Эти люди не проявляют слабости, они решительны, особенно когда четко намечают план своих действий. Они умеют отразить любые атаки: будь то словесные выпады в их адрес или физические действия, направленные против них. Людям Чертога Орла полезно заниматься практиками на овладение силой как в духовной части, так и в физической. Орел уже рождается с сознанием своих сил. Причем, это касается не только физических, но и интеллектуальных способностей. Любознательные дети этого Чертога из молодых ногтей склонны к страстям познания мироздания. Ими руководит ненасытное желание узнать природу происхождения любых явлений и предметов. Чертог Орла двигает своих подопечных к новым открытиям. Орлы обладают врожденными лидерскими качествами, но при этом у них нет места высокомерию и высокомерию. Будучи образцом смелости и великодушия, они с радостью придут на помощь страдающим. Редкостью для них бывает такая черта, как меркантильность. Орел не считает нужным отвлекаться на материальное, считая себя рожденным для других, более высоких целей. Однако именно такой подход, не учитывающий потребности приобретения или получения благ для себя, становится проблемой в супружеской жизни. Хотя чаще всего авторитетность и властолюбие уравновешивают этот недостаток, имея в виду получение благ другим путем. Но это зависит от многих качеств конкретного человека.Лучшей парой для Орла станет тот партнер, который сможет мелкие бытовые проблемы свалить на себя. Ибо при кажущейся силе, Орел пасует перед мелкими материальными проблемами. Зато он достаточно верный и отзывчивый мужчина, что тоже ценно.\nСемья для Орла - это его крепость, бастион, который будет им всячески защищаться и оберегаться от любого негативного вторжения. Дети - предмет гордости и надежды, на которые Орел возлагает славу и продолжение своего рода. Он им всячески помогает и заботится, превращаясь рядом с ними в бережного и мягкого отца, преданного им всем сердцем.Такая идеальная картина не совсем точно передает образ рожденного в Чертоге Орла. В те моменты, когда какому-нибудь опрометчивому лицу придет в голову оскорбить его или напасть на его семью, Орел становится отважным защитником своим близким. Дух воина дремлет внутри лишь до тех пор, пока не возникнет намек на опасность.\nМужчины, родившиеся в Чертоге Орла , бесстрашные и воинственные, они любят спорт, боевые единоборства. Однако они не превращают это в самоцель. Они ценят знания, отлично обучаются и способны впитывать огромные объемы информации. В плане построения личных отношений мужчины Чертога Орла бывают ветреными и крайне непредсказуемыми. С одной стороны, они стремятся заботиться о своих родных, но с другой - иногда на них нападает апатия ко всему происходящему, и тогда даже наличие семьи не сможет способствовать их возвращению к полноценной жизни. Если такой мужчина вдруг приходит к выводу, что его жизненное призвание требует одиночества, то семья отходит на второй план. Женщины, родившиеся в Чертоге Орла , очень внимательны и бережны, они доброжелательны, умны и альтруистичны. Они любят помогать другим, легко берут кого-то под свое покровительство, защищают и заботятся. Их подлинное призвание заключается в защите близких от всяких бед и непредвиденных ситуаций.Они умеют быть благодарными, на искреннюю любовь отвечают взаимностью, оставаясь преданными своей второй половинке до конца дней. Светлое чувство любви женщины Чертога Орла готовы пронести из-за всех непогод и мирской жизни. Женщина-Орел - это полет над миром с целью контроля и защиты своего пространства. Она редко сомневается в своих решениях. Если она поставила цель, она пойдет к ней напрямую, не боясь трудностей. У Орлиц очень развито чувство ответственности за слабых. Она всегда поможет, защитит и даст мудрый (хотя иногда и жесткий) совет. Ей важно быть авторитетом. Поэтому она много читает, изучает новое и стремится стать экспертом в своем деле. Орел не умеет пресмыкаться. Она знает себе цену и не позволяет окружающим переходить границы дозволенного. В семье Женщина-Орел - это фундамент. На ней держится порядок, дисциплина и безопасность рода. Она не выберет слабого мужчину. Ей нужен «равный», человек чести, которого она сможет уважать. Несмотря на свою независимость, она крайне предана семье. Ради благополучия близких она способна на любые жертвы. Её главный минус - желание всё контролировать. Она часто «давит» на домочадцев своей опекой, считая, что только она знает, как будет лучше для всех. С ней сложно играть в игры или лукавить. Она предпочитает горькую правду и ждет того же от супруга. Женщина-Орел - прирожденный руководитель или наставник. Она расцветает там, где нужна структура и порядок.\n\n\n                                                   Бог Покровитель.\n\nПерун - это Бог-громовержец, Молнии его оружие, Радуга - его лук, облака - одежда или борода и кудри, Гром - далеко звучащее Слово, ветры и бури - дыхание. Перун - Бог грозы и войны. \n\n                                                     Священное дерево.\n\nСвященное Дерево - Дуб. Чертог Орла в покровителях получил сразу два символа мужской силы и доблести - бога Перуна и дерево дуб. Следует отметить, что эти высшие силы активно влияют на характер своего подопечного, внося в него лидерские качества, упрямство для достижения целей, желание всегда быть победителем. Дуб - дерево божественной и невероятной энергетической силы. Это дерево было отождествлением мощи Перуна. И в далекие времена имело однокорневое название со своим божеством. Но позже имя бога постарались забыть, так же стерло из памяти название ритуального дерева, его символа и источника жизненной энергии, помогающей мужу-воину. Дерево победителей. Ему посвящались обряды перед тяжким походом князя с дружинниками. В дубравах проводились ритуалы инициации, когда вьюнош становился мужчиной и получал в руки свое первое боевое оружие. Любое военное снаряжение освящалось под обрядовые песни у главного дуба-оберега.\nКаждому воину следовало ( и следует ) иметь при себе частицу дуба в виде оберега, чтобы оно придавало человеку смелость, уверенность, бесстрашие и доблесть. При этом любому негодяю и клятвоотступнику такой оберег мог стать наказанием.\nДуб является энергетическим донором. При прямом контакте с ним человек получает очень вероятное количество жизненной энергии. Но. Его аура очень мощная, она хорошо воспринимает только здоровых людей.\nОбщение с дубом заряжает человека активирующей энергией, успокаивает душу. Давно подмечено, что прогулки по дубраве нормализуют кровяное давление, благоприятно отражаются на работе сердца и нервной системы.\nСчитается, что амулет из желудя обеспечивает долголетие , молодость, достижение и стремление к цели.Также желудь способствует пробуждению энергии и сил молодости.\n\n                                                   Священные камни.\n\nКамнями-талисманами для Чертога Орла, покровителем которого является бог Перун, традиционно считаются натуральный янтарь, горный хрусталь, малахит и агат. Эти минералы соответствуют сильной, мудрой и решительной энергии данного знака, помогая усилить видение, решимость и защиту.",
    "15.white leopard": "                                               Чертог Раса (Рысь, Белый Леопард).\n\n\nЛюдей чертога Раса (Рыси, Белого Леопарда) отличает целеустремленность и рассудительность. Однако при этом они не всегда способны принимать во внимание мнение другого человека. Они могут ценить то, что им дано сверху. Эти люди с раннего детства осознают свою особую силу и уникальность. Однако они не должны забывать о уважительном отношении к Богу и Матери-природе, которые, собственно, и являются для них главным источником жизни и энергии. Вместе с веселым нравом и беззаботностью люди Чертого Раса проявляют спокойствие и рассудительность в момент рассмотрения важных вопросов.\nМужчины, родившиеся Чертоге Раса , ответственно относятся к своим рабочим обязанностям, они стремятся выполнять все качественно и точно вовремя. Им можно доверить решение любых задач, они сделают максимум и обязательно достигнут поставленных целей. Для них нет непреодолимых препятствий, это стойкие и отважные люди. Отрицательной чертой некоторых мужчин Чертога Раса является эгоистическое отношение к окружающим. Они могут в этом смысле «идти головами», когда считают, что выбранная ими цель оправдывает любые средства. Однако из-за этого они могут потерять авторитет и уважение в обществе, что в конечном счете приведет к одиночеству.\nЖенщины, родившиеся в Чертоге Раса , положительные, открытые и жизнерадостные. Их можно легко узнать по задорному смеху и оптимистичному настроению. Они словно светятся изнутри и способны передавать свое настроение окружающим. Иногда они кажутся безрассудными, но на самом деле обладают жизненной мудростью и рассудительностью. Наделенные от природы разнообразными талантами, женщины Чертога Раса могут реализовать себя в разных сферах, постоянно демонстрируя ответственность, усердие и отличные результаты. Чертог Раса наделял своих подопечных очень живым и импульсивным характером. Расы могут быстро заниматься интересной идеей, увлекаться новым занятием или делом, но, не видя конкретной цели, могут так же быстро перегорать, сворачивать свою активность . Иногда даже приходит в упадок из-за того, что не могут добиться больших результатов.Беда в том, что Расы не могут четко артикулировать ту цель, к которой стремятся, но это заставляет их бродить по пути к ней, удаляясь от успеха. Ведь четкий план - половина победы. Но характер Расы настолько широк и благороден, что по дороге к намеченным вершинам он будет пытаться свалить на себя чужие заботы и заботы, помогать обездоленным или обиженным, а своя цель так и останется далеко недоступной.Однако счет своей доброты Раса в процессе жизненного пути обзаводится таким невероятным количеством друзей, что их благодарность помогает Рыси-Леопарду в жизни. Мудрость Раса всегда пользуется заслуженным уважением со стороны общества. Он не приобретает никогда славы наслаждения или алчности. Леопард получает то, что сеет - доброту, человеколюбие, щедрость и отвагу. Одним из сильнейших качеств, которым наделяет Чертог Раса, - смелость. Это черта тех, кто рожден с духом воина-защитника. Это качество никогда не употребляется во зло. Оно сидит в душе Расы тихо, ровно до тех пор, пока нужно встать на защиту слабого и обиженного. Но если этот отважный человек сталкивается с несправедливостью, подлостью или другим проявлением зла, то дух воина тут же просыпается и дает смертный бой. Иногда их добрый нрав вводит недоброжелателя в заблуждение и вызывает желание испытать на Расе свою подлость, но это жестоко прекращается и наказывается Леопардом. Их ответ наглости будет молниеносным и сокрушительным, Раса не позволит играть с собой. Очень часто Расы являются одновременно умными и решительными людьми. Их отличный набор качеств рано или поздно становится залогом того, что они поднимаются на вершину власти или приобретают огромный авторитет в социуме. Таких людей часто можно встретить в ипостаси руководителей, лидеров, ведущих большие общины. Один из совсем немногих недостатков - лень. Вот с ней Расам следует бороться больше, чем с внешним недругом, потому что она бывает их злейшим врагом. От того, насколько успешно Леопард поборет эту коварную злодейку, зависят те плоды, которых он способен достичь.\n\n                                                Бог Покровитель.\n\nБог Тарх-Даждьбог. Сварожич является Богом-Покровителем и олицетворением Златого Солнца в Чертоге Расы на Сварожьем Круге. Наши предки верили, что Даждьбог заботится о свадьбе, встречает жениха на рассвете в день Освящения Семейного Союза, поэтому и говорили, что Свадьбы совершаются на Небесах и освящаются Даждьбогом - Солнцем. Был назван Даждьбогом (дающим Богом) за то, что дал людям Великой Расы и потомкам Рода Небесного Девять Саньтий (Книг).\n\n                                                 Священное Дерево.\n\nЯсень олицетворяет собой мудрость поколений и ясность разума. Согласно историческим писаниям, листья и ветки дерева питаются опасной энергией, благодаря чему обладают чудодейственными магическими свойствами. Ветви священного дерева простираются высоко в небо, а корни уходят к важнейшим истокам: к богам русским, к перворожденным людям. Ясень - это дерево возрождения и обновления. Кроме того, ясень олицетворяет связь того, что наверху, с тем, что внизу, то есть связь мира богов и мира людей или мира духовного и материального. Ясень обычно в мифологии символизирует Мировое дерево или Древо жизни; в норвежских мифах ясень был посвящен верховному богу Одина; его называли Иггдрасил; он был источником жизни и бессмертия; крона, ствол и корни соединяли подземный мир, землю и небеса.\nЯсень - дерево огромных возможностей. Оно наделяло своих подопечных силой влиять и взаимодействовать с энергиями Вселенной. Такие люди чаще всего имели способности к ясновидению, колдовству и предсказанию. А влияние Расы, благородного зверя, усиливало тягу человека совершать добрые поступки, используя дар высших.Из этого же дерева было принято делать защитный оберег тем, кто мог пострадать в борьбе с тьмой. Ибо уникальные возможности магической силы могли быть привлекательны для тех, кто хотел вредить. Руна Раса, взаимодействуя с ясенем, имела огромное защитное значение своего подопечного.\nВетви ясеня, повешенные над входной дверью, оберегают от злых сил, а пояс, сделанный из зеленой коры, служил защитным средством против магов и волшебников. Для защиты дома и близлежащего участка разбросайте листья ясеня на четыре стороны. С этой же целью они используются в мешочках и при совершении магических действий. Кроме того, особая магия традиционно приписывается огню, разожженному на ясеневых дровах. Дым такого очага считается священным курением, а исходящая от огня сила - благотворной и целебной.\n\n                                                Священные камни.\n\nОсновным камнем-талисманом для Чертога считается янтарь. Этот натуральный камень идеально подходит представителям чертога, так как символизирует солнечную энергию, плодородие и мудрость, помогая раскрыть их потенциал, трудолюбие и жизнелюбие, а также служит сильным оберегом.\n\n\n",
    "16.virgo": "                                               Чертог Девы.\n\nЭто единственный Чертог, названный не в честь зверя или птицы, а посвященный образу человека, его духу (джива - санскрит). Но это не случайно, ведь человек является частью природы и имеет свое место в программе мироздания. Без человека Ява (Жизнь) не имела бы смысла, она вершина божьего замысла. Чертог Девы - знак людей, которые пришли на землю видеть. Их высшее предназначение сводится к тому, что после них на земле в Яве должны оставаться плоды труда, мысли, материальные блага. Поэтому небеса даровали покровителям этого Чертога те сущности, которые дают силу и вдохновение в развитие и умножение.\nДжива своей божественной силой умножает мощь духа, а дерево яблоня как вдохновитель придает устремлениям человека материальную ориентацию. Поэтому среди Дев высокий процент очень организованных, логически мыслящих представителей, которые всеми силами нацелены строить и видеть. Люди, родившиеся в этом Чертоге, очень целенаправлены. Они стремятся познавать мир, проявляют лидерские качества и упрямство. Эти люди обладают всеми качествами лидера, способными достигать намеченного, они независимы и самодостаточны, способны предусматривать будущие изменения . Отрицательно реагируют, когда кто-то пытается навязать им свое мнение по поводу принятия важных решений. При чрезмерной зацикленности на собственной личности у людей чертога Девы может проявляться сильное упрямство.\nПод покровительством Живы рождаются очень целеустремленные и активные люди. Они с детства полны идей и желания приобретать знания и воплощать их на практике. Хорошие стратеги, четко планирующие путь к мечте и часто получающие намеченное. Несмотря на то, что среди них рождается очень много людей с творческим началом и видением прекрасного, все же небеса наделили их чрезмерным желанием добиваться успехов в материальном приумножении. Поэтому в выборе профессии Девы часто жертвуют своими творческими устремлениями, выбирая жизненный путь материального использования.\nНужно отметить в характере Дев основательную долю вспыльчивости, в случае если кто-то из окружающих или партнеров по делу отнесся к выполнению планов кое-как.\nДевам-холерикам свойственно очень быстро выходить за пределы покоя, когда его подводят. Таким поведением она заставляет других встряхнуться и мобилизоваться в работе. Также следует отметить наличие у Дев огромного потенциала предсказания. Многие склонны связывать такую способность с какими-то магическими свойствами, но на самом деле разум Девы настолько совершенен, что очень быстро обрабатывает полученные факты и анализирует, получая готовый просчет ситуации на многие шаги вперед.\nВ древности разумные и интеллектуальные Девы не задерживались в положении простого земледельца или воина, им обязательно удавалось достичь положения волхва, головы племени или военачальника. Такие лица не работают в поле, Девы рождены добиваться главенствующей роли.\nЖениться Дева не спешит, к каким-либо романтическим отношениям подходит сверхсерьезно. Создавая семью, Дева прежде всего позаботится о доме и состоянии, чтобы создать наилучшие условия для этого. Жена тоже пытается выбрать из тех, с кем можно строить благополучный дом.\nНужно обязательно отметить, что родившийся в Чертоге Девы человек является одним из тех, кто двигает развитие человечества вперед. Так же, как и Джива своим живущим священным потоком вдыхает в Явь способность к жизни, так и Дева заражает своим энтузиазмом и активными действиями общество к совершенствованию и прогрессу.\nМужчин, родившихся в Чертоге Девы , отличает мягкий характер, добродушие и дружелюбие. Они предпочитают не вступать в конфликтные ситуации, однако это не означает, что они будут терпеть унижения или выпады в свой адрес. Если в этом возникнет потребность, муж Чертога Девы даст мощный отпор любому, кто рискнет посягнуть на его личное пространство, честь, достоинство или попытается навредить его семье и близким. Имея внутреннюю творческую энергию, муж Чертога Девы обычно реализует ее в художественном или музыкальном творчестве, становится поэтом, научным деятелем или философом. Благодаря стремлению недостижимых высот может стать первоклассным руководителем и безоговорочным лидером, которому по силам умело организовать работу своих подчиненных. Женщины, родившиеся в Чертоге Девы. , как правило, никогда не испытывают трудностей с зачатием и сложностями во время беременности и родов, поскольку Богиня Жива заботится о беременных и роженицах, помогая им легко выполнять свою природную функцию. \nЖенщины, рожденные в Чертоге Девы находятся под покровительством богини Дживы - олицетворения самой жизни, вечной молодости и душевной чистоты. Женщинам Чертога Девы удается создавать крепкие семьи, где всегда царит теплая и уютная атмосфера, гармония , взаимопонимание и уважение друг к другу.Свое подлинное призвание женщины этого черта обычно находят в творческой деятельности, позволяющей им в полной мере раскрыть свой внутренний потенциал. Женщина-Дева обладает удивительной способностью предчувствовать события. Она живет в ритме с миром и часто кажется окружающим «не от мира сего» из-за своей проницательности. Она видит скрытую суть вещей. Ей не нужно объяснять мотивы поступков - она чувствует их на уровне души. Часто обладает способностями к ясновидению или целительству. У них «алчущий» разум. Они постоянно учатся, исследуют и копят знания, становясь к зрелости настоящими кладезями мудрости. Несмотря на внешнюю мягкость, Дева обладает огромной внутренней силой. Она не терпит давления и всегда идет своим путем, прислушиваясь к внутреннему голосу. Для неё физическое влечение вторично. Ей нужен мужчина, с которым она сможет говорить о вечном, кто поймет её богатый внутренний мир. Даже в браке Дева остается немного загадочной и обособленной. Ей необходимо личное пространство для размышлений и духовных практик.\n\n                                                    Бог Покровитель.\n\nБогиня Джива Дева Жива, Дива , Сива - Богиня Вечной Всемирной Жизни, Богиня молодых и чистых Душ Человеческих. Богиня Джива дает каждому человеку при рождении в Мире Явы чистую и светлую Душу. Богиня ДЖИВА является олицетворением плодоносной силы Жизни, вечной молодости, юности и влюбленности, а также высочайшей красоты всей природы и человека. Богиня-Покровительница Чертога Девы в Сварожом Круге.\n\n                                                     Священное Дерево.\n\nЯблоня - дерево, дающее плоды знания. Это дерево - символ плодородия, красоты и богатства. С яблоней связывают материальный аспект. У нее задача - вдохновлять подопечного на достижение результатов своего труда. Из древесины яблони принято было делать амулеты на богатство и умножение благ в закромах. От того, какой урожай будет собран в поле, насколько полными станут закрома, зависит жизнеспособность семьи и всего рода. Говорят, что в Ирии на яблоне молодильные яблоки растут. И тот , кто их ест, никогда не стареет.\nЯблоко - символ красоты и совершенства, изобилия и божественного дара, а также молодости, плодородия и познания. Яблочный цветок - символ обновления и расцвета, а также - стремление к познанию.\nЯблоко использовалось в магии для привлечения любви. Цветы яблони добавляются в мешочки, варево и ароматическое курение, их кладут в расплавленный розовый воск, отцеживают и делают свечи, которые зажигают для привлечения любви. Самое простое средство - разрезать пополам яблоко и предложить половинку тому, кого вы любите. Это обеспечит вам обоим счастье.\nНа протяжении многих веков в Европе среди незамужних женщин были распространены гадания о любви, в которых использовались яблоки. Просто разрежьте яблоко пополам и сосчитайте количество семян. Если количество парное, то вы вскоре выйдете замуж.Если одно из семян оказывается разрезанным, это означает, что ваши отношения могут быть очень бурными. Если окажется, что разрезаны два семечка, то вам придется вдовство. Если количество семян окажется нечетным, то в ближайшее время женщина замуж не выйдет.\nИз древесины яблони выходят великолепные волшебные палочки, особенно подходящие для эмоциональных видов магии, а также любовных ритуалов. Яблочным сидром можно заменять кровь , когда это нужно в старых рецептах.\nИз древесины яблони можно вырезать фигурки. Это дерево женской силы, женской сексуальности, пробуждающей в женщине чувственную сторону натуры.Если вы хотите испытать приток эротических сил, то ложитесь спать летом под яблоней, правда , она охотнее делится своими силами с молодыми девушками. Под воздействием энергии яблони девушка может вообразить образ идеального соответствующего ей мужчины, а во сне увидеть жениха. Для энергии яблони нет нравственных правил, она управляется только призывом природы. \n\n                                               Священные камни.\n\nКамни для Чертога Девы направлены на гармонизацию их практичной натуры, помогая развивать интуицию и сохранять баланс. Лучшими камнями считаются изумруд, сапфир, яшма, сердолик, нефрит и хризолит. Эти минералы защищают от негатива и поддерживают здоровье.",

    "2.pike": "                                            Чертог Щуки.\nЧертог Щуки вобрал в себя покровительство сразу двух богородиц: Рожаны - богини семейного достатка и Щуки - царицы речной и матери водяного духа. Мудрость Одновременно двух божеств занимается людьми этого Чертога и вносит в их характер черты рассудительности, доброты и просветления. Чертог Щуки получил свое название в честь прародителя всего речного мира.\nОбраз Щуки-волшебницы сохранился до наших времен в мифах и преданиях. Широко известная сказка о Емеле и Щуке, исполняющей желания - яркий пример народных сказаний.\nЛюдям, родившимся в этот период, свойственно стремление к спокойной, размеренной жизни. Основная сложность для них - принять важное решение. Однако к новым и неожиданным обстоятельствам они легко приспосабливаются. Люди Чертога Щуки обладают способностью ладить с детьми, они хорошо понимают поведение малышей, их поступки и желания. Гармония во всем - в быту, в душе и сознании - к этому стремятся те, кто появился на свет в период Чертога Щуки.\nОднако, при всех своих преимуществах иногда они могут быть наивны, чрезмерно просты и абсолютно беззащитны. В это время рождаются очень умные, добрые и невероятно терпеливые люди. Словно впитали в себя способности своей покровительницы Рожаны, они всегда пытаются сгладить конфликт, избежать ссоры, уступить.\nКак пример кротости, Щуки, тем не менее, не простаки. Им от природы дан большой дар наукам. Причем с раннего детства у них не наблюдается особого стремления к знаниям, но постигая мир, осознавая свою роль в нем, Щуки будто раскрываются. Впоследствии они занимают высокое положение в обществе, ибо стараются и проявляют себя наилучшим образом.\nЧертог Щуки наделяет людей не только пытливым умом, но и красотой. Даже если ее не видно с лица, внутренний мир Щуки привлекателен и мил. Это те люди, которые обязательно вызовут симпатию у противоположного пола. Умелые и хозяйственные, они усердно ведут дом. А если под знаком Щуки родился мужчина, то он способен сделать любую женщину счастливой, потому что от природы верный, направленный на накопление и зарабатывание материальных благ, обязательно окружит домочадцев теплом и заботой.\nОпределяя свой земной путь, Щуки пытаются выбрать тот путь, где можно проявить свое милосердие и заботу. Не гнушаются добиваться человеческой славы.\nЧертог Щуки дарит людям удивительное чувство прекрасного и умение творить. Среди Щук есть настоящие таланты лицедейского искусства или умельцы, олицетворяющие красоту нашего мира в картинах. Их внутренний мир настолько богат, что переполняет и стремится к публичной оценке, отсюда стремление к воплощению в художественных произведениях. Но искусство не единственная сфера, в которой Чертог Щуки одарил своего подопечного талантами. Щука успешно проявляет себя по каждому делу, за которое не возьмется. Естественное усердие и проницательность - залог успехов. Особенно преуспевают там, где нужно анализировать, просчитывать. Отлично справляются в сфере финансов и умножения.\nМужчины, родившиеся в Чертоге Щуки , особенно удачливы в делах и новых начинаниях.Они отличаются мягким, но при этом упорным характером. В них присутствует несокрушимый внутренний стержень, который помогает им добиться успеха практически на любом поприще. Женщины, родившиеся в Чертоге Щуки , отличаются невероятным стремлением к семейному благополучию, они умеют обустраивать свой дом, хорошо понимая значение выражения «мое здание - моя крепость». Они ревностно оберегают уютный дом от любых посягательств извне. Женщины Чертога Щуки способны прекрасно воспитать ребенка, как своего, так и не родного им по крови. Они могут родить и вырастить детей, верных своей земле и своему Роду. Рожденные в чертоге щуки - Гармония во всем - в быту, в душе и сознании - к этому стремятся те, кто появился на свет в период Чертога Щуки.\n                                       \n                                                 Бог Покровитель.\n\nБогородица Рожана. (Мать Родиха, Рожаница) . Вечно молодая Небесная Богородица. Богиня семейного достатка, душевного богатства и уюта. Богородице Рожане совершали особые жертвоприношения пищей: блинами, оладьями, хлебами, кашами, медом и медовым квасом. Древний Славяно-Арийский культ Богородицы Рожаны, как и другие культы, посвященные Богородицам и Богиням, связан с женскими представлениями о продолжении Рода и судьбе новорожденного младенца, которому определяется Судьба.\n\n                                                 Священное дерево.\n\nВ отличие от других деревьев, которые телом-древесиной помогают своим подопечным, слива сильна плодами. Слива плодоносит не только вкуснейшими фруктами, но еще и очень полезными для человека. Уникальный набор элементов способен помочь в лечении целого набора телесных заболеваний - от нехватки витаминов до проблем с сердцем и желудком. К тому же, слива была большой кормилицей у древних народов, еще не познавших секретов длительного хранения ягод и фруктов. Плоды сливового дерева сушили, вяли на жарком солнце и даже коптили во времена далекой древности. Это умение позволяло заготовить запасы, которые спасали от голода и помогали пережить холодную зиму. К тому же, слива - кладезь полезных веществ, богата невероятным количеством витаминов и микроэлементов, которые были открыты учеными совсем недавно, но уже в старину помогали людям сохранять и восстанавливать здоровье.\nВетви сливы, повешенные над дверью и окнами, предохраняют дом от вторжения злых духов. Сливу едят для привлечения или сохранения любви. Может помочь вылечить страх потери самоконтроля, предотвратить вспышки ярости, или если вы находитесь на грани нервного срыва или депрессии.\n\n                                            Священные камни.\n\nЧертог Щуки символизирует стремление к спокойствию, адаптацию и семейный уют. В качестве камней-оберегов для людей этого чертога чаще всего рекомендуют использовать жемчуг и кораллы, связанные с водной стихией. Они помогают обрести мудрость, уравновесить эмоции и защититься от негатива.\n",
    "3.swan": "                                               Чертог Лебедя.\n\nПредставителям этого Чертога, как правило, свойственна уникальная душевная организация, но также их отличает и завидное трудолюбие. Они всегда рассчитывают только на себя и не полагаются на удачу. Кроме того, они обладают способностью проникать в тайны Судьбы как своей, так и других людей. Они преуспевают в земледелии, вкладывают всю душу в свой нелегкий труд. Предпочитают традиционный жизненный уклад, размеренный и спокойный. Но не всегда умеют принимать решения. Конечно, чего не отнять - это мудрость и проницательный ум Лебедя. От их пристального и наблюдательного взгляда не сможет укрыться ни один пустяк. Они замечают все, что происходит, но не всегда произносят вслух свои выводы. Чертог Лебедя наделяет человека стремлением к власти, умением сопереживать и понимать чужое горе. Считается, что люди, рожденные в Чертоге Лебедя, имеют уникальный дар «зреть в корень» любой ситуации.\nЛебеди обладают отличными организаторскими способностями, им важно упорядочивать окружающую среду, делать ее удобной и разумной. Им нравится, чтобы вокруг все было красиво и ухожено - этими качествами в характере руководит Макошь. От нее Лебедю передалось чувство познания прекрасного, любовь к творчеству. От богини Лебедя им достался мягкий нрав и склонность к верной любви. Для Лебедя всегда важен тот, кому отдано их сердце. Их смысл - заботиться о любимом человеке и стремиться к самопожертвованию ради него.\nВ «Слове о полку Игореве» есть описание лебединой песни, которую пела или точнее голосила-плакала Ярославна в тоске по своему мужу. Лебединой верностью называют чувства, когда есть склонность к полному растворению в любви к своему партнеру. Вот и люди этого Чертога очень больно переживают любой разрыв или расставание с любимым.\nКроме того, Лебеди еще очень ценят свой дом. Их жилье имеет священные границы, ревностно охраняемые от любого вторжения. Лебеди пытаются сделать жилье уютным и спокойным местом, чтобы со своей семьей наслаждаться благополучием. Пытаются, чтобы дом был комфортным местом для ближайших.\nЛебеди - довольно неконфликтные люди, пытающиеся обходить ссоры и дискуссии. Но если уж кому-то пришла в голову тронуть гордость Лебедя, то такой человек немедленно получит отпор. Лебеди из прекрасной птицы мгновенно превращаются в грозного противника. А поскольку они достаточно умны, то и отпор будет дан хитро, с выдумкой, так, чтобы в дальнейшем не хотелось. Рожденные в чертоге лебедя люди,  чего у них не отнять - это мудрость и проницательный ум Лебедя.\nМужчины- Лебеди редко впадают в панику. Внешне они могут казаться холодными или отстраненными, но это лишь маска. Внутри них кипит работа мысли. Они предпочитают сначала оценить ситуацию со всех сторон и только потом действовать. Иногда могут быть излишне консервативны и требовать от домочадцев соблюдения установленных ими правил. Связь с Макошью дает им дар «видеть насквозь». Мужчину-Лебедя трудно обмануть - он чувствует ложь на подсознательном уровне. Часто они обладают философским складом ума и интересуются тайными знаниями или психологией. Если долго испытывать их терпение, «тихий омут» превращается в шторм. Гнев Лебедя холодный и разрушительный. Иногда они считают свое мнение единственно верным и с трудом принимают чужую точку зрения. Склонны к самокопанию и могут впадать в депрессивные состояния, если чувствуют, что их жизнь потеряла «правильное» русло. Женщина, рожденная в Чертоге Лебедя - это воплощение спокойной силы, грации и глубокой житейской мудрости. Поскольку её покровительницей является Макошь, характер такой женщины пронизан созидательной энергией. Она - истинная хранительница очага. У неё есть природный дар организовывать пространство вокруг себя так, чтобы всем было тепло и уютно. Её дом часто становится «полной чашей», где всегда пахнет вкусной едой и царит порядок. Часто обладает талантом к творчеству - шитью, вязанию или дизайну, вкладывая в это душу. Ради благополучия близких она готова отодвинуть свои интересы на второй план, но требует за это искренней благодарности и уважения. Она никогда не позволит унижать себя. В её характере есть благородная гордость, которая не позволяет ей опускаться до мелочных склок. Если её границы нарушены или задеты интересы её детей, «тихий Лебедь» превращается в грозную защитницу. Её гнев может быть внезапным и очень сильным. Как и мужчины этого знака, женщины обладают мощным «шестым чувством». Они часто видят вещие сны или просто заранее знают, чем закончится то или иное дело. Обмануть такую женщину практически невозможно - она чувствует фальшь на уровне инстинктов. Для женщины-Лебедя жизненно важно найти баланс между заботой о других и вниманием к себе. Если она забывает о своих желаниях ради семьи, её энергия истощается, что ведет к приступам раздражительности.\n\n                                                       Бог Покровитель.\n\nБогородица Макошь. Богородица Макошь - Небесная (Сва) Богородица, Справедливая Богиня счастливого жребия и Судьбы. Вместе со своими дочерями, Судьбой и Недолею, определяет Судьбы Небесных Богов, а также судьбы всех людей и всех потомков Рода Небесного, живущих на нашей Земле, плетя для каждого из них Нити Судьбы. Поэтому многие обращались к Богине Макоши, чтобы она доверила сплетать Нить Судьбы в клубок младшей дочери - Богини Судьбы. Богиня Макошь во все времена была очень внимательной и бережной Покровительницей ткачества и всяческого рукоделия, а также следила за тем, чтобы на полях, где пахари (крестьяне) вкладывают Душу в свой нелегкий труд, рос хороший урожай.\n\n                                                       Священное Дерево.\n\nТо дерево, которое своими соками питает жизнь подопечного, называется сосна. Это дерево милосердия и доброты. Его силой можно было изгонять бесов любой болезни, поэтому оно широко применялось для амулетов, связанных со здоровьем. Сосна наделяла огромной мудростью и милосердием своих подопечных. Родившиеся в Чертоге Лебедя получали от сосны возможность снять усталость восстановить свои силы. Одним из полезных свойств сосны считается ее возможность лечить сердечные заболевания и проблемы дыхания.\nСжигайте измельченные и сухие иглы хвои, чтобы очистить дом зимой от злых сил. Особенно рекомендуется смешивать в равных долях с можжевельником и кедром.\nСосновые шишки носят с собой, чтобы повысить способность к рождению детей и сохранить силу в старости, орехи едят с той же целью.\nСосна - дерево покоя и высоты духа. Если в вашей жизни пришел важный момент, решается ваша судьба и необходимо в спокойной обстановке ответить на ряд серьезных вопросов, без общения с сосной не обойтись. При прямом контакте сила сосны испытывает раздражение и досаду, которые ежедневно накапливаются в вашей душе. Энергия сосны поможет вам избавиться от нервных расстройств, стресса. Ни один невроз не устоит под влиянием. Сосна - милосердное дерево. К нему следует обращаться с открытой душой. Сосна способна очистить ауру человека от постороннего действия, частично снять порчу. В старину считалось, что запах сосны способствует избавлению от чувства вины.\n\n                                                     Священные камни.\n\nКамни Чертога Лебедя, покровителем которого является богиня Макошь, призваны гармонизировать эмоциональную стойкость, укреплять интеллект и защищать. К основным магическим камням для рожденных в этот период относятся обсидиан, нефрит, лазурит (ляпис) и халцедон. ",
    "4.snake": "                                                Чертог Змея.\n\nРождение в Чертоге Змея предсказывает человеку светлую, яркую судьбу. Представители Чертога Змея отличаются невероятной активностью, направляемой исключительно на добрые дела. Редко когда увидишь людей-змей, сидящих на одном месте и долго размышляющих о высоких материях Они находятся в постоянном движении, которое в зависимости от ситуации и жизненных обстоятельств может быть хаотичным или упорядоченным. Отличительная черта людей этого периода - мудрость. Однако в некоторых ситуациях они склонны проявлять эгоизм и консервативность. Родившиеся в Чертоге Змея очень коммуникабельны, могут добиться хороших результатов в информационной сфере. Также достигают успеха и уважения в сфере знаний, благодаря умению найти в себе мудрость сил огня.\nПредставители Чертога Змея в любви обычно разбираются лучше других. Они трепетно восхваляют высокое чувство, проявляющееся в их нежном и бережном отношении к своему избраннику. В любовь они готовы окунуться с головой, но требуют такой самоотдачи от партнера. Если Змеи заметят, что любимый человек не готов к каким-либо жертвам ради сохранения семейной идиллии или отказывается принимать непосредственное участие в решении неотложных проблем, такие отношения долго не продержатся. Змеям нужен не просто добрый любовник для удовольствия телесных утех, а настоящий друг и товарищ, на которого можно положиться в трудную минуту.\nМужчины, родившиеся в Чертоге Змея , всегда способны мудро, взвешенно и трезво оценивать ситуацию, благодаря чему принимают правильные решения, позволяющие им добиться успехов в работе и личной жизни. Мужчин Чертога Змея отличают волевой характер и решительность, поэтому они всегда идут только вперед. Они умеют слушать и способны отказаться от своего, иногда необъективного взгляда. Однако, если доказательства их не удовлетворяют, они раздражаются и перестают воспринимать аргументы. Поэтому в общении с мужчинами Чертога Змея очень важно заинтересовать их первым предложением - тогда компромисс возможен. Такое свойство характера может способствовать развитию у мужчин этого Чертога эгоизма и самовлюбленности. Женщины, родившиеся в Чертоге Змея , улавливают малейшие изменения в эмоциональном состоянии находящихся рядом с ними. Они умеют любить по-настоящему, всем сердцем и всей душой. Но их минус состоит в том, что они и от других требуют того же - полной и абсолютной самоотдачи. Женщины Чертога Змея умеют обратить на себя внимание не только своими внешними данными, но и врожденным умением привлечь любого человека к откровенному разговору. Рождение в Чертоге Змея предсказывает человеку светлую, яркую судьбу.\n\n                                                      Бог Покровитель.\n\nБог Семаргл. (Огнебог) Вышний Бог, охранник Вечного живого Огня и охранник точного соблюдения всех Огненных Обрядов и Огненных Очищений Семаргл принимает Огненные Дары, Требования и бескровные Жертвоприношение на древних Славянских и Арийских праздниках особенно на Красногор, в День Бога Купала и в дни Перуна, являясь посредником между людьми и всеми Небесными Богами. Огнебог Семаргл- это огненный пес с орлиными крыльями.\n\n                                                     Священное Дерево.\n\nСвященным деревом Чертога Змея считается Липа. В славянской культуре это дерево ассоциируется с семейным счастьем и природной красотой. В народе считалось, что если постоять некоторое время под раскидистой кроной Липы, то у человека могли появиться разные сверхъестественные возможности. Липа могла утешить в трудную минуту и дарила вдохновение перед новыми начинаниями. Из Липы создавали домашнюю утварь и делали обереги. Соцветия липы (липовый цвет) применяют в медицине как потогонное средство, а также для ароматизации чая. Липа является ценным медоносом. В Европе липа используется очень широко благодаря ее защитной силе. С этой целью ветки липы вешают над дверью или сажают в сад. Если постоянно носить с собой кору липы, это предохраняет от отравления, а листья и цветы применяют в любовной магии. Поскольку это дерево символ бессмертия, его листья используются в магии такого рода. Липу и лаванду в равных частях смешивают и набивают смесь подушки. Страдающие бессонницей могут забыть об этой проблеме, если будут спать на такой подушке. Из дерева липы вырезают амулеты к счастью и носят их с собой. Мешочки с липовым цветом усиливают творческие способности, особенно у детей. Энергия ее сильна и мягка. Вызывает чувство тепла и покоя. Способствует избавлению от депрессии.\n\nПочти повсеместно считалось, что в липу не бьет молния, поэтому липы, растущие около церквей, служили своего рода громоотводами. Объясняли это тем, что некогда липа якобы попросила Бога, чтобы он направлял молнии в нее, а не в церкви, которые строили рядом с ней; поэтому липу называли охранительницей церквей и находящихся в ней людей.\nЭта способность Липы, а также ее иные полезные свойства (целебная сила, медоносность, мягкость древесины и т. д.) рассматривались славянами как результат ее благословения свыше. Известны легенды, в которых в ответ на готовность липы служить громоотводом для церкви Бог награждает липу всеми названными качествами, а также морозостойкостью, способностью быстро восстанавливаться после попадания в нее молнии и многое другое.\n\nМягкость и податливость древесины липы была переосмыслена в разных жанрах славянского фольклора, причем, в отличие от бытовой практики, где это свойство липы оценивалось позитивно и оказалось широко востребовано, в фольклоре эпитет липы получал значение ‘недолговечный, слабый, бедный’. Это значение заметно, например, в русской лирике, где «липовый дом» - дом бедняка-горюна: «Иван молодой, не качай головой, Не качай головой, мне не быть за тобой, У Ивана горюна ни скота, ни живота; Одна липова изба, решощаты ворота», в пословице, иронизирующей над бедностью: «Богат стал: вместо лаковых сапог обул липовые». Образ «заиндевелой липы» (в подблюдных песнях) стал символом безбрачия: «Стоит липа на крутой горы, ды макушки с корня ўся заинела».\n\n                                                       Священные камни.\n\nКамни Чертога Змея направлены на усиление интуиции, защиту и развитие мудрости. Основными минералами считаются аметист, лазурит, обсидиан и нефрит. Также используются гематит, гранат, изумруд и янтарь, которые помогают справляться с энергией огненного знака.",
    "5.crow": "                                              Чертог Ворона.\n\nВремя Ворона - это период зимнего солнцестояния, когда зима сковывает все земные чертоги, природа замирает и готовится битва за возрождение Яви. Для славян, равно как и для других древних народов, эти дни имели сакральное значение - победит Свет или Тьма, начнет ли добавляться солнечный день. Чертог Ворона назван в честь вещей птицы, символа мудрости и хранителя тайн. Именно эти качества наиболее прослеживаются в людях, рожденных во время Ворона - они мудры, спокойны и целеустремлены. Еще время Ворона находится во власти бога Коляды. Для славян это время ожидания - победит ли свет, начнет ли добавляться день, уменьшится ли зимняя тьма, или грядет возрождение Весны. Чертог Ворона - время великой битвы Тьмы и Света за власть в Яве. Это время, когда бог Коляда переворачивает круг, по которому идет Солнце. Имя Коляды имеет происхождение от слова круг. То есть формально Коляда тот , кто ведет Солнце по кругу, сменяет день и ночь, зиму и лето.\nЛюди, родившиеся в этом Чертоге, неординарны, добры и приятны в общении. Очень часто они не могут наладить свою семейную жизнь до 40 лет. Эти люди часто очень активны и энергичны, но для ощущения гармонии рядом с ними должен быть спутник жизни. Стремясь обрести любовь на всю жизнь, люди Чертога Ворона в этом поиске могут быть очень влюбчивыми и часто менять партнеров. Чертог Ворона вносит в характер своих подопечных огромную часть мудрости и спокойствия. Это те люди, которые становятся духовными наставниками и предводителями славян. В их характере наиболее развитые черты - упорство , рассудительность, стремление к знаниям. Все, что обязательно приносит нам полезные изменения. Во многих цивилизациях описано рождение сынов божьих в человеческом подобии во время зимнего солнцестояния. У Воронов прекрасно развит дар убеждения и красноречия. Им дана власть над душами и сердцами людей, что способствует развитию возможности восхождения Воронов в ранг авторитетов, духовных наставников или проповедников. Редко родившийся во время Ворона останется на низшей ступени развития личности - это совсем нехарактерно для них.\nВ Воронах собран огромный запас жизненной энергии, они активны, решительны, деятельны. С раннего детства понимают, что труд - залог их успеха. При этом следует отметить, что Ворон очень материально нацелен. Большинство их устремлений ориентированы на улучшение собственного благосостояния, что неразрывно связано с благом всего человечества. Для Воронов важно сохранить и приумножить свое положение в обществе.\nИм важно отдавать, делиться своими эмоциями и плодами жизнедеятельности. Даже свои планы они нецеленаправленно проецируют на все человечество, для них это фактор, определяющий выполнение их миссии - творить добро для всех, быть необходимым звеном в человеческом роде. Огромным бедствием может обернуться для их психики вынужденное отшельничество. Недостаток общения, обмена энергетическими потоками с другими живыми существами способен погубить Ворона.\nВажной чертой у Воронов следует отметить неприятие лжи. Этим людям не свойственно лгать самим, а тем более они беспощадно разоблачают лжецов, как главных разрушителей добра. Ибо любая ложь несет в себе зерно Зла, которое всегда дает отрицательную лестницу. В описание характеристики Ворона обязательно нужно добавить такие качества, как принципиальность, доброта, миролюбие, терпение . Их разум имеет огромный потенциал к развитию, познанию наук. В общем, они могут быть хорошим примером для подражания, потому что главными чертами у Ворона всегда становятся те, что направлены на позитив и творение .\nМужчины, родившиеся в Чертоге Ворона , очень активны, жизнерадостны и деятельны. Они постоянно стремятся что-то делать, чего-то стремиться, у них всегда много самых разных планов. Однако, несмотря на свой активный и порой бесшабашный образ жизни, в обиходе они крайне скрупулезны, предпочитают покой и уют. Особенно это начинает проявляться с возрастом. Мужчины Чертога Ворона часто становятся учителями и наставниками, поскольку им нравится передавать накопленные знания и опыт другим поколениям. Женщины, родившиеся в Чертоге Ворона , часто с раннего детства демонстрируют неординарные и даже экстрасенсорные способности. Часто они бросаются в водоворот чувств с головой, что нередко приводит к печальным результатам. Женщины Чертога Ворона часто бывают уязвимыми, поскольку их тонкая и ранимая натура очень чувствительна даже к безвредным шуткам. В воспитании потомства они проявляют себя с лучшей стороны, будучи для ребенка любящей и бережной матерью, близким другом и мудрым советчиком в одном лице. Чертог Ворона вносит в характер своих подопечных огромную часть мудрости и спокойствия.\n\n                                                    Бог Покровитель.\n\nБог Коляда. В древности Вышний Бог Коляда даровал многим переселившимся в западные земли родам систему исчисления сезонного времени для ведения полевых работ - Календарь (Коляды дар), а также свои Мудрые Веды, заповеди и наставления. Коляда является Богом-Покровителем ратных людей и Жрецов. Коляду часто изображали с мечом в руке, причем клинок меча был обращен острием вниз. Меч, обращенный острием вниз, в древности означал сохранение Мудрости Богов и Предков, а также непреложное соблюдение Небесных Законов, как это установлено Богом Сварогом для всех Чертогов Сварожьего Круга.\n\n                                                   Священное Дерево.\n\nЛиственница - дерево просветления и священного успокоения. Оно дарит своим подопечным высочайшие знания тайны миротворства. Дерево мудрости и разума способно наделить огромными знаниями и душевным спокойствием. Люди, рожденные под покровительством лиственницы, приходят в мир Яве мудрецами уже выходя из материнского лона. На них восходит тайна просвещения, они те, кто способен внести в наш мир волю вершителей. Лиственница - успокаивающее дерево, обладающее мягкой и светлой энергетикой. Если человека что-то пугает, его мучают сомнения и беспричинное беспокойство, «общение» с лиственницей принесет ему большое облегчение. Она исцеляет тяжелые нервные расстройства, особенно сопровождающиеся приступами меланхолии, и депрессию. Ее влияние помогает увидеть жизнь с лучшей стороны. Поможет ли она если вам не хватает уверенности в себе, вы боитесь провалов или считаете, что вы не так хороши, как окружающие. Поможет добиваться цели любым способом и брать от жизни гораздо больше. Лиственницу носят с собой или на теле, чтобы защитить себя от колдовства и защитить от плохого глаза.\n\n                                                   Священные камни.\n\nКамнями-талисманами для Чертога Ворона считаются агат (особенно черный) и вулканит. Эти минералы символизируют мудрость, стабильность и связь с природой, помогая раскрыть потенциал людей, рожденных под покровительством бога Коляды. Также часто используется раухтопаз, как камень близкий к этому знаку.",
    "6.bear": "                                                 Чертог Медведя.\n\nРодившиеся в этом Чертоге люди - добрые и внимательные к окружающим. Они настойчиво идут к своей главной цели - облагородить все вокруг себя. Они умеют начать дело с нуля и довести его до завершения. Имея великолепную фантазию, они могут стать творцами, изобретателями чего-то нового, как в области науки, так и в искусстве. Присущие им черты характера - храбрость и мужество.\nЧертог Медведя - то время, когда рождаются очень положительные, добрые люди. Их характер, словно из ниток, соткан из любви, добра и заботы. Медведь, как ясно солнышко, может своим появлением озарить, потому что нет человека, которому он приносит плохо.\nС детской поры у Медведей простой, легкий нрав, стремящийся к познаниям. Они невероятно умны и наделены огромным потенциалом развития.\nОчень старательны к наукам, поэтому способны достигать ярких результатов в будущем. Но, стоит учесть - их самым главным врагом являются лень. Как и сам символ Чортога, Медведь вносит в характер подопечных свою известную особенность - впадать в спячку. В людях такая черта не имеет признаков сезонности, она, к сожалению, преследует ее в настоящее время. Если смогут медведи преодолеть свой недостаток, то всегда смогут улучшить свои достижения.\nКогда главой семейства является муж Чертога Медведя, такая семья обязательно будет процветать, причем - во всех сферах: и в материальной, и в духовной, и в отношении потомства. Мужчины Медведи мужественны и устойчивы, они не уступают перед жизненными обстоятельствами, хотя совсем не обязательно сильны физически. Их мощь - во внутреннем духовном стержне, который невозможно сломить. Женщины, родившиеся в Чертоге Медведя , прилагают максимум усилий, чтобы их семья была благополучной и ни в чем не нуждалась. Они стремятся улучшить не только мир вокруг, но и себя. Женщины Чертога Медведя ответственны и осторожны во всем: и в выборе спутника жизни, и в построении деловых отношений, и в вопросах воспитания детей.Такая вдумчивость позволяет им не совершать безрассудных поступков, а также всегда быть уверенными в собственной правоте. Женщины Медведи очень бережны и добры, они внимательны к окружающим. Получив расположение такой женщины, можно всегда рассчитывать на ее помощь и понимание.\nРожденным в чертоге Медведя передается вся сила этого священного животного.\n\n\n                                                   Бог Покровитель.\n\nЗаступается за него творец тверды земной и всесильной мысли - Сварог. «Ипатьевская летопись» сравнивает Сварога с Гефестом - богом-кузнецом.\nОн символ миропорядка. Когда приходит война, бог-труженик и творец способен взять в руки свой молот и сокрушить врага. Чертог Медведя посвящен животному, символизирующему древних славян. Наши славные предки, подобно своему демиургу Сварогу, способны были трудиться и получать благодатные плоды от выращивания пашни.\nНо когда враг ступает на землю отцов, то всякий славянский человек превращается в бесстрашного воина, разбивающего всякую нечисть. Так и медведь - животное мирное, пока его не тронут злом.\nВнушая в своих подопечных могущественную силу, Сварог наделил их огромным любящим сердцем, чтобы утихомирить их мощь и направить ее в русло творения. Однако основной заботой этого божества было покровительство над трудом. Ибо имя Сварог происходит от слова «сварганить», что значит сотворить, сотворить.\nПоэтому первой заботой этого божества было, есть и будет покровительство мирному творческому труду, который делает мир Яве лучше и удобнее.\nСимвол божества - кузнец, иссекающий искры молотом, из которых получают огонь. Ведь огонь - это большая сила , способная как разрушать, так и дарить свет и тепло. \n\n                                                    Священное Дерево.\n\nЧертог Медведя в славянском гороскопе находится под покровительством бога Сварога. Его священными деревьями считаются бук (символ мудрости, достатка и стойкости) и малина. Оберег с буком помогает людям этого чертога обрести уверенность, мужество и удачу в делах.\n\n                                                      Священные камни.\n\nЧертог Медведя в славянском гороскопе символизирует силу, стойкость и мудрость, покровительствуемый богом Сварогом и священным деревом Буком. Основными оберегами являются натуральный коготь или клык медведя, защищающие от злых силпривлекающие удачу и здоровье. Камни- аметист, цитрин, кремень.\n",
    "7.stork": "                                                   Чертог Бусла (Аиста).\n\nЛюди, рожденные под знаком Бусла (Аиста), нежны, в меру эмоциональны и покладисты. Они всегда стараются поддерживать порядок не только в доме, но и в собственных мыслях, текущих делах и личных отношениях. По натуре они спокойны и миролюбивы, но если им постоянно кто-то мешает и мешает добиться своих целей, Бусл этого не потерпит и окажет достойное сопротивление. Они придают особое значение семейным ценностям, готовы на самопожертвование ради сохранения и улучшения семьи. Люди, родившиеся в этот период, очень трудолюбивы. Все, что у них есть в жизни, - это результат их труда. Они отзывчивы, и по первому зову спешат на помощь близким. Они могут сохранять знания, поэтому они могут стать служащими в исторических фондах или архивах, хранителями родословных. Особенно хорошо люди Чертога Бусла способны сохранить знания и традиции своего рода, полностью передать их следующим поколениям. Недаром Чертог назван в честь аиста - птицы, которая славится своей верностью дому, семье, птенцам и партнеру, выбираемому раз и на всю жизнь.\nТакже аисты-люди отмечены как крепкие хозяйственники и отличные семьянины. Описание их характера очень подобно этой миролюбивой птице. Им свойственно отдать свои чувства раз и навсегда одному партнеру, которому сохраняют верность до конца дней. Аисты славятся своим отношением к детям, которых рожают большое количество, ибо они видят смысл продолжения своей крови, рода. Во чертоге Бусла обычно рождаются те, кто отличается невероятным человеколюбием и покладистым характером. К тому же, у Буслов всегда открытое, чуткое сердце, заставляющее их заботиться об окружающих, с любовью относиться к природе и любой населяющей ее живности. Наверное, поэтому среди Буслов бывает мало воинов, захватчиков. Им свойственны поступки, приносящие мирные плоды - земледелие, искусство, развитие науки. Особенно, в чем аисты процветают, это творчество - Рисование, рукоделие. Их тонкий внутренний мир способен уловить красоту мироздания, которая другим не видна и не подвластна осмыслению.\nЭти люди, как правило, невероятно умны, имеют острый взгляд, от которого не скроется ни одна деталь. Они хорошо разбираются в людях, словно по наитию чувствуют суть человеческую, даже то, что скрыто глубоко в душе и не показывается чужакам. Их сложно обмануть, потому что обман они способны распознать на взгляд и вздохи - так сильна интуиция Буслов. У рожденных в Чертоге Аиста хорошо развита собственная мотивация для достижения целей.\nМужчины, родившиеся в Чертоге Бусла , являются верными друзьями, готовыми прийти на помощь в любую минуту, они никогда не забывают добра. Этих мужчин нельзя назвать упрямыми, но они целенаправленны настолько, что иногда это мешает им увидеть правильные пути решения простейших вопросов.\nЖенщины, родившиеся в Чертоге Бусла , умеют находить «хорошие места» для развития своего Рода. Чаще у этих женщин счастливая и крепкая семья, здоровое потомство. Они рачительные хозяйки, любят и умеют вести домашние дела, ходатайствовать по дому, обустраивать свое жилье. Женщины Чертога Бусла, как правило, многодетны, они очень сильны и выносливы, всегда спешат на помощь тем, кто слабее их и нуждается в защите.\n\n                                                      Бог Покровитель.\n\nРод - верховный Бог-Творец в славянской традиции, прародитель всего живого, создатель трех миров: Прави (небесного), Яви (земного) и Нави (загробного). Он считается творцом вселенной, первобытной силой, разделившей свет и тьму, а также покровителем семьи, рода и продолжения жизни, от которого произошли слова «природа», «родина».\n\n                                                       Священное Дерево.\n\nДерево, которое Аисты считают тем, что дает им силу - ива. Для восточных славян ива считалась особым деревом. Ива - дерево эмоций, дающее широкий спектр чувств, переживаний тем, кому заступается. Духом ивы принято было подпитывать свои жизненные силы и просить у нее покровительства в случае душевных и сердечных мучений. У этого дерева просили помощи и подсказки, наметив какое-нибудь дело. Также из ивовой древесины Аисты делали себе оберег, на котором изображали руну, обозначающую Чертог Бусла, согласно руническим изображениям, соответствующим конкретным знакам Сварожого круга. Силу, которую дает ива, нельзя назвать хорошей - этому дереву проблемы добра и зла совершенно безразличны. Его сила служит только природе, единственный закон, имеющий над ивой. закон равновесия и справедливости. Посадите иву в саду, лучше всего на берегу ручья или реки. Это обеспечит исключительно эффективную защиту вашего дома от злых сил. Носите с собой ветви этого дерева, чтобы избавиться от страха перед смертью. Завяжите на тонкой ветке ивы узел. Это станет материальным символом ваших намерений при заклинаниях. Если ваше желание сбудется, развяжите узел. Сохраните ветку для следующих заклинаний.\n\n                                                       Священные камни.\n\nКамнями-оберегами для Чертога Бусла (Аиста) традиционно считаются натуральные камни, способствующие гармонии и защите: обсидиан, нефрит, лазурит (ляпис), халцедон и черный агат. Эти камни помогают представителям чертога сохранять душевное равновесие и приносят удачу. \n",
    "8.wolf": "                                               Чертог Волка.\n\nВолкам может быть свойственна жесткость, но не жестокость. Волки осторожны, но не агрессивны. Интроверты, всегда предпочтут свой близкий круг или одиночество - шумным компаниям. Будут уходить от конфликта, пока не случится настоящая угроза.\nНападать на Волков - себе дороже, с ними нужно жить в мире. Тогда они будут лучшими товарищами.\nВолкам свойственна решимость, но они всегда осторожны и часто с презрением относятся к людям без внутреннего стержня. Они склонны идеализировать окружающих людей, а потому часто разочаровываются в неверности и легкомыслии людей.\nВолкам свойствена верность в отношениях. Мужчины волки отважны, иногда безрассудны, на первый взгляд, но они всегда знают, чего хотят. Женщины-волки редко бывают старыми девами, в основном, они всегда с партнером.\nРожденные в чертоге Волка могут работать врачами, полицейскими, служить в армии, они - хорошие и честные журналисты, которые уважают факты.\nБог-покровитель Волка - Велес, дает им много умений в области земледелия, ведения домашнего хозяйства. Так же из них получаются отличные охотники и мастеровые. \nМужчины, рожденные в этом чертоге, - это личности с непростым, «диким» характером. Они сочетают в себе преданность стае и абсолютную потребность в личной свободе. Они не любят поверхностности. Если Волк за что-то берется, он докопается до самых истоков, будь то научная проблема или устройство двигателя. Даже будучи душой компании, такой мужчина часто чувствует себя обособленно. Ему жизненно необходимо время, чтобы «уйти в логово» и побыть наедине с мыслями. В конфликтных ситуациях они действуют жестко и стремительно. Они не ищут драки, но если на их территорию или семью посягнули - пощады не будет. От них редко услышишь пустые комплименты. Они прямолинейны, порой до грубости, зато вы всегда знаете их истинное мнение. С ним бывает трудно из-за его скрытности. Он не из тех, кто будет обсуждать свои чувства за ужином; его любовь проявляется в делах, а не в словах. Если мужчина-Волк - это воин и защитник, то женщина этого знака - это хранительница смыслов, интуитивный стратег и «серый кардинал» своей семьи. Она видит людей насквозь. Обмануть такую женщину практически невозможно - она считывает фальшь на уровне инстинктов. Ей важно понимать, как устроен мир. Это те женщины, которые в детстве разбирали игрушки, а во взрослом возрасте постоянно учатся, проходят курсы или изучают психологию. Она редко жалуется. Даже в самые тяжелые времена она будет держать спину прямой, предпочитая справляться с проблемами самостоятельно. У нее очень высокая планка - как для себя, так и для окружающих. Это часто делает её путь к счастью непростым, так как она не согласна на «меньшее». Она долго присматривается к партнеру. Ей не нужен просто «спутник», ей нужен соратник, равный по силе духа. Даже в самом счастливом браке ей нужен свой уголок, свое время и свои секреты. Попытка тотального контроля со стороны мужа приведет к немедленному разрыву. Она - строгая, но справедливая мать. Она не будет баловать детей сверх меры, её цель - воспитать их сильными, самостоятельными и готовыми к жизни. Как и мужчины этого чертога, женщины-Волки склонны к глубокой привязанности. Предательство для них - единственная вещь, которую невозможно простить. \n\n                                                    Бог Покровитель.\n\nВелес является одним из наиболее почитаемых богов в славянском язычестве, он может считаться богом плодородия, сельского хозяйства, животноводства, богатства, знаний и житейской мудрости.\n\n                                                    Священное Дерево.\n\nСвященное дерево этого знака - тополь, широко почитаемый людьми за способность поглощать негатив из воздуха. Тополь по своей природе является «энергетическим вампиром» и поглощает негативную энергию не только из окружающей среды, но и от людей. Если посадить дерево возле дома, то хозяева могут почувствовать депрессию. Объясняется это просто - тополь способен отнять у человека жизненную энергию. Чтобы очистить дом от негативной энергии или снять напряженную атмосферу, древние славяне обычно использовали небольшие кусочки дерева, которые расставляли в разных углах различных комнат.\n\n                                                     Священные камни.\n\nКамнями-талисманами для Чертога Волка традиционно считаются аметист (гармония), бирюза (защита), голубой топаз, гранат, зеленый агат, лунный камень, хризолит и цитрин. Эти минералы поддерживают бесстрашие, мудрость и защиту от сглаза.",
    "9.fox": "                                               Чертог Лиса.\n\nЧертог Лиса властвует в то время, когда весна вступает в свои права - это время гибели демона Зимы и возрождение, пробуждение духа Весны. В момент весеннего равноденствия происходит колдовство - отступает Тьма, давая возможность светлому дню стать длиннее. Чертог Лисы получил название в честь символа хитрости, ума, красоты и превращения. Считалось, что лиса своими хитрыми хитростями помогает духу Весны войти в права и окрепнуть, победив сумерки зимнего времени.\nЛиса в славянской мифологии - персонаж, облеченный невероятным умом, способностью преобразования, хитростью.\nПри этом он не имеет четкого разграничения на положительное или отрицательное значение героя. Лису уважали, при этом опасались стать жертвой ее проказ. Чертог Лисы привносит в характер человека уникальное свойство пластичности. Лисы могут достигать разного положения в обществе, попадать в любые ситуации, но что ни отнять - всегда выкрутятся, вывернут все себе на пользу. Этот человек невероятно умный, прозорливый, целеустремленный. Родившиеся в этом Чертоге умеют перевоплощаться, изменяться в соответствии с моментом, диктующим обстоятельства. Они не лишены духа авантюризма, но являясь персонами, ориентированными на извлечение выгоды, все же очень осторожно подходят к реализации своей мечты.\nИм свойственно любой свой шаг продумывать и просчитывать с учетом - пойдет ли на пользу, или принесет потери задуманное. Человек этого Чертога имеет хорошо развитое чувство меры. Он скрупулезно относится к своим расходам, умеет удачно вложить капитал, чтобы получить прибыль.\nКак правило, Лиса даже не получив хорошего образования, умеет достичь высокого положения в обществе. Описание Лиса не может обойтись без упоминания о его сильных качествах характера. Это те люди, которые никогда не откажутся от своих взглядов. Они обладают невероятным упорством, всегда отстаивают собственное мнение.\nВ любви и сердечных делах человек, рожденный в Чертоге Лисицы, чаще всего склонен к верности. Для него небольшое значение имеет внешняя привлекательность партнера, он скорее предпочтет внутреннюю красоту избранника. Если судьба подарила им спокойные, комфортные отношения, Лиса способна пустить в ход весь свой арсенал положительных качеств, чтобы семья была обеспечена и употреблена. Большое значение в жизни Лис играют дети. Это те создания, которые способны пленить лисье сердце и вить из него веревки. Лисицы растворяются в детях без остатка, позволяя им практически все и балуя, чаще всего даже в ущерб сорванцам. На их защиту и обеспечение всех капризов у Лисы уходит огромное количество времени и финансов.\nТак же стоит упомянуть, что Лиса обязательно обладает хотя бы минимальными способностями к магии и колдовству. Часто они замечают за собой способность к ясновидению, врачебным возможностям или талант к заговору, снятию порчи.\nМужчины, родившиеся в Чертоге Лиса , обладают сдержанным и одновременно решительным характером, а также твердой непреклонной волей, позволяющей им добиваться поставленной цели в короткие сроки. Но часто они очень много размышляют, вместо того чтобы наконец начать что-то делать. Мужчины Чертога Лисы не принимают монотонный, однообразный труд, который просто «убивает» их интерес к жизни. Их настоящее призвание - приносить ощутимую пользу, поэтому чаще всего они занимают руководящие должности. Мужчины Чертога Лисы - это тонкие стратеги, интеллектуалы и мастера дипломатии. Жизнь мужчины-Лиса - это бесконечный поиск ответов, скрытых смыслов и наиболее эффективных путей к цели. Это не подлость, а именно житейская мудрость. Он найдет выход из ситуации, которая кажется тупиковой, используя логику и нестандартное мышление. Они умеют нравиться. Обладая природным магнетизмом, Лис легко втирается в доверие, мастерски используя дар убеждения. Они редко строят воздушные замки. Каждое их действие должно приносить результат - материальный или интеллектуальный. В любви он предпочитает игру, завоевание и легкий флер загадочности. Ему важна интеллектуальная близость с женщиной. Лис сделает всё, чтобы его семья ни в чем не нуждалась. Он умеет добывать ресурсы буквально «из воздуха», обеспечивая комфорт и стабильность. Даже прожив с ним 20 лет, жена может не знать о его некоторых планах или мыслях. Он оставляет за собой право на «тайную комнату» в душе.\nЖенщины, родившиеся в Чертоге Лисице , постоянно стоят перед тем или иным выбором: моральным, моральным, философским из-за чрезмерного любопытства - им интересно попробовать оба варианта. Они не бывают довольны ни синицей в руке, ни журавлем в небе - им нужно и то, и другое одновременно. Поэтому женщины Чертога Лисы иногда могут быть достаточно эгоистичными. Чтобы такого не произошло, рядом с ними всегда должны быть мудрые наставники: сначала родители, потом муж и верные друзья. Женщина Чертога Лисы - это воплощение женской хитрости в самом благородном смысле этого слова. Её покровительница, богиня Марена (Мара), наделяет её магическим обаянием, холодным умом и способностью выживать в любых условиях. Женщина-Лис - это загадка, которую можно разгадывать всю жизнь. Она редко бывает прямолинейной, предпочитая достигать целей обходными путями. Она обладает невероятным шармом. Даже не будучи классической красавицей, она притягивает взгляды благодаря внутреннему огню и уверенности. Ей нужно знать всё. Она обожает сплетни, новости и новые знания не ради праздного интереса, а чтобы владеть информацией - главным оружием Лисы. Она как вода - принимает форму любого сосуда. Лис легко вписывается в высшее общество, в рабочий коллектив или в суровую походную жизнь, везде чувствуя себя хозяйкой положения. Она редко верит на слово. Каждое утверждение она проверяет на логику и выгоду.\nТакая женщина - не просто спутница, это искусный манипулятор (часто во благо), стратег и вдохновительница.\nЛисы предпочитают работать в сфере, связанной с увлекательными событиями, поиском информации и творческой самореализацией. А если работа этого не приносит, они вносят в свою жизнь дополнительные приключения: поездки, походы, путешествия. Люди Чертога Лиса имеют хорошо развитое чувство меры. \n\n                                                    Бог Покровитель.\n\nМара (Марена, Морена) Великая Богиня Зимы, Ночи и Вечного Сна и Вечной Жизни. Богиня Марена, или Марена Свароговна, одна из трех невест сестер Многомудрого Бога Перуна.\n\n                                                       Священное дерево.\n\nСвященным деревом Чертога Лисы по славянскому календарю является граб. Этот оберег символизирует стойкость, решительность, помогает преодолевать физические и душевные раны, избавляет от излишней торопливости и защищает от наговоров.\n\n                                                      Священные камни.\n\nКамнями Чертога Лиса являются лавовый камень и черный агат.",

    const grid = document.getElementById("grid");

    const modalImg = document.getElementById("modalImg");

    const dateInput = document.getElementById("birthDate");

    function escapeHtml(s) {
      return String(s).replace(/[&<>\"]/g, (m) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '\"':"&quot;" }[m] || m));
    }

    function isInChertog(m, d, c) {
      const [sm, sd] = c.start;
      const [em, ed] = c.end;
      if (sm === em) return m === sm && d >= sd && d <= ed;
      if (sm < em) return (m === sm && d >= sd) || (m === em && d <= ed) || (m > sm && m < em);
      return (m === sm && d >= sd) || (m === em && d <= ed) || (m > sm || m < em);
    }

    function applyDesktopHiResAssets() {
      const isDesktop = window.matchMedia("(min-width: 1024px)").matches;
      if (!isDesktop) return;
      const highResIcons = {
        "1.boar": "chertogs/1.boar.webp",
        "2.pike": "chertogs/2.pike.webp",
        "3.swan": "chertogs/3.swan.webp",
        "4.snake": "chertogs/4.snake.webp",
        "5.crow": "chertogs/5.crow.webp",

      Object.keys(highResIcons).forEach((id) => {
        iconData[id] = highResIcons[id];

    }

    function init() {
      console.log('init() called');
      chertogs.forEach((c) => {
        const item = document.createElement("button");
        item.className = "chertog-item";
        item.id = "item-" + c.id;
        item.type = "button";
        item.setAttribute("aria-label", c.name);
        item.onclick = () => openModal(c.id);
        item.innerHTML = '<img class="chertog-img" src="' + iconData[c.id] + '" alt="' + c.name + '" title="' + c.name + '" loading="lazy">';
        grid.appendChild(item);
      });

      dateInput.addEventListener("change", calculateChertog);
      document.getElementById("closeBtn").addEventListener("click", closeModal);
      modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
      document.addEventListener("keydown", (e) => { if (e.key === "Escape" && modal.classList.contains("visible")) closeModal(); });
    }

    function calculateChertog() {
      const val = document.getElementById("birthDate").value;
      if (!val) return;

      const date = new Date(val);
      const m = date.getMonth() + 1;
      const d = date.getDate();

      const activeIds = [];
      const activeNames = [];

      for (let i = 0; i < chertogs.length; i++) {
        const c = chertogs[i];
        const el = document.getElementById("item-" + c.id);
        el.classList.remove("active");
        
        if (isInChertog(m, d, c)) {
          activeIds.push(c.id);
          activeNames.push(c.name);
          el.classList.add("active");
          
          setTimeout(() => {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 100);
        }
      }

      const resultDiv = document.getElementById("result");
      if (activeIds.length > 0) {
        if (activeIds.length > 1) {
          resultDiv.innerText = "Вы находитесь на межи: " + activeNames.join(" и ");
        } else {
          resultDiv.innerText = "Ваш чертог: " + activeNames[0];
        }
      } else {
        resultDiv.innerText = "";
      }
    }

    function openModal(id) {
      const c = chertogs.find((x) => x.id === id);
      const desc = (typeof chertogDescriptions !== "undefined" && chertogDescriptions[id]) ? chertogDescriptions[id] : "Описание временно недоступно.";
      const cleanDesc = desc.replace(/\n\s*\n/g, "\n\n");
      modalImg.src = iconData[id];

      // Use links from config.js (chertogiCommerceConfig) if available, otherwise fallback to hardcoded
      const links = (typeof chertogiCommerceConfig !== "undefined" && chertogiCommerceConfig[id]) ? chertogiCommerceConfig[id] : c;
      const linkChertog = links.chertogLink || c.linkChertog || "#";
      const linkGod = links.godLink || c.linkGod || "#";
      const linkMaterial = links.materialLink || c.linkMaterial || "#";

      const modalTextDiv = document.getElementById("modalText");
      modalTextDiv.innerHTML = "";
      const descDiv = document.createElement("div");
      descDiv.innerText = cleanDesc.replace(/\n/g, "\n\n");
      modalTextDiv.appendChild(descDiv);

      modal.classList.add("visible");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      modal.classList.remove("visible");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    applyDesktopHiResAssets();
    if (typeof init === 'function') init();

    // Инициализация flatpickr
    flatpickr("#birthDate", {
      locale: "ru",
      dateFormat: "Y-m-d",
      altInput: true,
      altFormat: "d.m.Y",
      allowInput: true,
      disableMobile: true

    // ============================================
    // AUDIO MANAGEMENT SYSTEM
    // ============================================
    (function() {
      let audio = null;
      const muteBtn = document.getElementById('muteBtn');
      const soundWave1 = document.getElementById('soundWave1');
      const soundWave2 = document.getElementById('soundWave2');

      const TARGET_VOLUME = 0.4;
      const FADE_IN_DURATION = 2000; // 2 seconds
      const FADE_OUT_DURATION = 1500; // 1.5 seconds

      let isMuted = true;
      let isPlaying = false;
      let audioStarted = false;
      let fadeInterval = null;

      // SVG paths for different states
      const ICONS = {
        muted: {
          wave1: '',
          wave2: '',
          line: 'M16 9l6 6M22 9l-6 6'
        },
        unmuted: {
          wave1: 'M15.54 8.46a5 5 0 0 1 0 7.07',
          wave2: 'M19.07 4.93a10 10 0 0 1 0 14.14',
          line: null
        }
      };

      // Update button icon based on mute state
      function updateIcon() {
        if (isMuted) {
          soundWave1.setAttribute('d', '');
          soundWave2.setAttribute('d', '');
          // Add mute indicator line
          if (!document.getElementById('muteLine')) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            line.setAttribute('d', 'M16 9l6 6M22 9l-6 6');
            line.setAttribute('id', 'muteLine');
            document.getElementById('speakerIcon').appendChild(line);
          }
          muteBtn.classList.add('muted');
          muteBtn.setAttribute('aria-label', 'Включить звук');
          muteBtn.setAttribute('title', 'Включить звук');
        } else {
          soundWave1.setAttribute('d', ICONS.unmuted.wave1);
          soundWave2.setAttribute('d', ICONS.unmuted.wave2);
          // Remove mute indicator line
          const line = document.getElementById('muteLine');
          if (line) line.remove();
          muteBtn.classList.remove('muted');
          muteBtn.setAttribute('aria-label', 'Выключить звук');
          muteBtn.setAttribute('title', 'Выключить звук');
        }
      }

      // Fade in audio from 0 to target volume
      function fadeIn() {
        if (!audio) return;
        audio.volume = 0;
        const startTime = Date.now();
        const step = () => {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / FADE_IN_DURATION, 1);
          audio.volume = progress * TARGET_VOLUME;
          if (progress < 1) {
            requestAnimationFrame(step);
          }
        };
        requestAnimationFrame(step);
      }

      // Fade out audio and execute callback when done
      function fadeOut(callback) {
        function fadeVolume(targetVolume, duration, callback) {
          if (!audio) return;
          
          if (fadeInterval) {
            clearInterval(fadeInterval);
            fadeInterval = null;
          }
          
          const startVolume = audio.volume || 0;
          const volumeDiff = targetVolume - startVolume;
          const steps = 60;
          const stepTime = duration / steps;
          let currentStep = 0;
          
          fadeInterval = setInterval(() => {
            currentStep++;
            const progress = currentStep / steps;
            const easeProgress = 1 - Math.pow(1 - progress, 3);
            audio.volume = Math.max(0, Math.min(1, startVolume + volumeDiff * easeProgress));
            
            if (currentStep >= steps) {
              clearInterval(fadeInterval);
              fadeInterval = null;
              audio.volume = targetVolume;
              if (callback) callback();
            }
          }, stepTime);
        }
        fadeVolume(0, FADE_OUT_DURATION, callback);
      }

      // Initialize audio on first user interaction
      function initAudio() {
        if (audioStarted) return;
        audioStarted = true;

        // Create and initialize audio object inside click handler
        audio = new Audio('slavetnodark.mp3');
        audio.loop = true;
        audio.volume = 0;
        
        // Load before play
        audio.load();
        
        audio.play().then(() => {
          isPlaying = true;
          isMuted = false;
          fadeIn();
          updateIcon();
        }).catch(err => {
          console.log('Audio playback failed:', err);
          audioStarted = false;
        });

        // Remove the one-time listeners
        document.removeEventListener('click', initAudio, true);
        document.removeEventListener('touchstart', initAudio, true);
        document.removeEventListener('keydown', initAudio, true);
      }

      // Mute/Unmute toggle
      function toggleMute() {
        if (!audio) return;
        isMuted = !isMuted;
        audio.muted = isMuted;
        updateIcon();
      }

      // Intercept shop link clicks for fade out effect
      function handleShopLinkClick(e) {
        const link = e.currentTarget;
        const href = link.getAttribute('href');

        // Only intercept if audio is playing and has valid href
        if (!audio || !isPlaying || !href || href === '#' || href === 'javascript:void(0)') {
          return;
        }

        e.preventDefault();
        e.stopPropagation();

        fadeOut(() => {
          window.location.href = href;
        });
      }

      // Attach shop link interceptors
      function attachShopLinkHandlers() {
        document.querySelectorAll('.shop-link').forEach(link => {
          link.removeEventListener('click', handleShopLinkClick);
          link.addEventListener('click', handleShopLinkClick);
        });
      }

      // Set up event listeners
      if (muteBtn) {
        muteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleMute();
        });
      }

      // Add one-time listeners for first interaction
      document.addEventListener('click', initAudio, true);
      document.addEventListener('touchstart', initAudio, true);
      document.addEventListener('keydown', initAudio, true);

      // Watch for shop-links being added to DOM
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.nodeType === 1) {
              if (node.classList && node.classList.contains('shop-link')) {
                node.addEventListener('click', handleShopLinkClick);
              }
              if (node.querySelectorAll) {
                node.querySelectorAll('.shop-link').forEach(link => {
                  link.addEventListener('click', handleShopLinkClick);
                });
              }
            }
          });
        });
      });

      observer.observe(document.body, { childList: true, subtree: true });

      // Initial attachment for any existing links
      attachShopLinkHandlers();

      // Initialize icon
      updateIcon();
    })();
  </script>

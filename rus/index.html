<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Калькулятор Чертогов" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0715" />
  <title>Калькулятор Чертогов</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      background-image: url('chertogs/Kolo.webp');
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      background-color: #050510;
      padding: 1vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(40, 15, 65, 0.22), rgba(0, 0, 0, 0.72));
      z-index: -1;
    }
    .header {
      margin-bottom: 0.3vh;
      background: rgba(0, 0, 0, 0.6);
      padding: 0.3vh 20px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0 0 30px rgba(123, 44, 191, 0.4);
      min-width: 50vw;
    }
    .mysterious-text {
      color: #ffd700;
      text-shadow: 0 0 10px #7b2cbf, 0 0 20px rgba(123, 44, 191, 0.9), 0 0 30px rgba(199, 125, 255, 0.65);
      animation: glow 2.8s ease-in-out infinite alternate;
      letter-spacing: 0.2px;
    }
    h1.mysterious-text {
      margin: 0.5vh 0;
      font-size: clamp(24px, 4vh, 40px);
    }
    label.mysterious-text {
      font-size: 1.2em;
    }
    .input-container {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .input-container label {
      font-size: clamp(20px, 3vw, 32px);
    }
    input[type="date"] {
      min-height: 54px;
      min-width: 240px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 2px solid #9d4edd;
      background: rgba(0, 0, 0, 0.25);
      color: #ffd700;
      font-size: clamp(20px, 2.6vw, 27px);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(157, 78, 221, 0.6);
      outline: none;
      font-family: Georgia, "Times New Roman", serif;
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) hue-rotate(180deg) saturate(2); cursor: pointer; }
    #result {
      margin-top: 0.3vh;
      min-height: 2vh;
      font-size: clamp(16px, 3vw, 24px);
    }
    .chertog-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: 1fr 1.5fr;
      gap: 1vw;
      width: 100vw;
      max-width: 100vw;
      margin: 5vh auto 0;
      padding: 0 2vw;
      height: 40vh;
    }
    .chertog-item {
      width: 100%;
      aspect-ratio: 2/3;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 3px solid transparent;
      opacity: 0.25;
      border-radius: 50%;
      overflow: hidden;
      filter: grayscale(60%) brightness(0.7);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
    }
    .chertog-item:hover {
      transform: scale(1.05);
      opacity: 1;
      filter: grayscale(0%) brightness(1);
      box-shadow: 0 0 20px 5px rgba(157, 78, 221, 0.7);
      border-color: #9d4edd;
    }
    .chertog-item:nth-child(n+9) {
      margin-top: 80%;
    }
    .chertog-item.active {
      opacity: 1;
      transform: scale(1.15);
      border-color: #ffd700;
      filter: grayscale(0%) brightness(1);
      z-index: 10;
      animation: rainbow-blink 1.5s infinite alternate;
    }
    .chertog-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      background: rgba(0, 0, 0, 0.5);
      transform: scale(1.08);
    }
    .chertog-img[src*="4.snake"] {
      object-position: center;
    }
    .chertog-img[src*="12.falcon"] {
      object-position: center;
      object-position: 30% center;
    }
    .chertog-img[src*="14.eagle"] {
      object-position: 40% center;
    }
    .chertog-img[src*="16.virgo"] {
      object-position: 20% center;
    }
    .chertog-img[src*="11.elk"] {
      object-position: 60% center;
    }
    .chertog-img[src*="3.swan"] {
      object-position: 77% center;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      overflow-y: auto;
    }
    .modal.visible {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .modal-img-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
      pointer-events: none;
      padding: 60px 20px 20px;
      box-sizing: border-box;
    }
    .modal-img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 0.25;
    }
    .modal-content {
      background: rgba(15, 5, 25, 0.8);
      padding: 40px;
      border-radius: 15px;
      max-width: 800px;
      margin-top: 50px;
      margin-bottom: 400px !important;
      z-index: 1;
      text-align: left;
      white-space: pre-wrap;
      box-shadow: 0 0 30px #9d4edd;
      line-height: 1.6;
      border: 1px solid #7b2cbf;
      font-size: 1.2em;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    .shop-links { margin-top: 20px; display: grid; gap: 10px; }
    .shop-link {
      display: block;
      padding: 13px 16px;
      border-radius: 12px;
      color: #ffe88f;
      text-decoration: none;
      border: 1px solid rgba(255, 215, 0, .55);
      background: linear-gradient(180deg, rgba(123,44,191,.45), rgba(63,20,103,.58));
      box-shadow: 0 0 12px rgba(157, 78, 221, .4);
      text-align: center;
      font-size: clamp(16px, 2.2vw, 21px);
      font-weight: 700;
      transition: transform .18s ease, box-shadow .18s ease;
      touch-action: manipulation;
    }
    .shop-link:hover { transform: translateY(-1px); box-shadow: 0 0 18px rgba(255, 215, 0, .45); }
    .close-btn {
      position: fixed;
      top: 20px;
      right: 40px;
      font-size: 60px;
      color: #ffd700;
      cursor: pointer;
      text-shadow: 0 0 20px #e63946;
      z-index: 10;
      transition: transform 0.2s;
      touch-action: manipulation;
      user-select: none;
    }
    .close-btn:hover { transform: scale(1.2); }
    .audio-control {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 215, 0, 0.5);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1002;
      transition: all 0.3s ease;
      box-shadow: 0 0 12px rgba(157, 78, 221, 0.4);
    }
    .audio-control:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      border-color: rgba(255, 215, 0, 0.8);
    }
    .audio-control svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #ffd700;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .audio-control.muted svg {
      stroke: #9d4edd;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #7b2cbf, 0 0 20px #7b2cbf, 0 0 30px #eaa8ff, 0 0 40px #fff; }
      to { text-shadow: 0 0 20px #9d4edd, 0 0 30px #9d4edd, 0 0 40px #ffd700, 0 0 50px #fff; }
    }
    @keyframes rainbow-blink {
      0% { box-shadow: 0 0 20px 5px rgba(255,0,0,.9); border-color:#ff0000; }
      25% { box-shadow: 0 0 30px 10px rgba(255,255,0,.9); border-color:#ffff00; }
      50% { box-shadow: 0 0 20px 5px rgba(0,255,0,.9); border-color:#00ff00; }
      75% { box-shadow: 0 0 40px 15px rgba(0,255,255,.9); border-color:#00ffff; }
      100% { box-shadow: 0 0 30px 10px rgba(255,0,255,.9); border-color:#ff00ff; }
    }

    /* Flatpickr стилизация */
    .flatpickr-calendar {
      background: rgba(15, 5, 25, 0.95) !important;
      border: 1px solid #7b2cbf !important;
      box-shadow: 0 0 20px rgba(123, 44, 191, 0.6) !important;
    }
    .flatpickr-months .flatpickr-month {
      background: transparent !important;
      color: #ffd700 !important;
    }
    .flatpickr-current-month input.cur-year,
    .flatpickr-current-month .flatpickr-monthDropdown-months {
      color: #ffd700 !important;
    }
    .flatpickr-weekday {
      color: #9d4edd !important;
    }
    .flatpickr-day {
      color: #fff !important;
    }
    .flatpickr-day:hover {
      background: rgba(157, 78, 221, 0.4) !important;
      border-color: #9d4edd !important;
    }
    .flatpickr-day.selected,
    .flatpickr-day.selected:focus,
    .flatpickr-day.selected:hover {
      background: #9d4edd !important;
      border-color: #ffd700 !important;
      color: #ffd700 !important;
    }
    .flatpickr-day.today {
      border-color: #ffd700 !important;
    }

    /* Desktop styles */
    @media (min-width: 1024px) {
      html, body { height: 100%; }
      body {
        height: 100vh;
        overflow: hidden;
        padding: 10px 16px;
        background-size: cover;
      }
      .header {
        margin: 0 auto 10px;
        padding: clamp(10px, 1.6vw, 18px);
      }
      .chertog-grid {
        width: 100vw;
        max-width: 100vw;
        margin: 5vh auto 0;
        padding: 0 2vw;
        height: 40vh;
        gap: 1vw;
        grid-template-rows: 1fr 1.5fr;
      }
    }

    /* Tablets and mobile (≤768px) */
    @media (max-width: 768px) {
      body {
        padding: 8px;
        background-image: url('chertogs/Kolo.webp');
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: scroll;
        background-size: cover;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .chertog-grid { 
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: none;
        grid-auto-rows: max-content;
        align-content: start;
        gap: 2vw; 
        width: 100vw;
        max-width: 100vw;
        padding: 0 2vw;
        margin: 5vh auto 0;
        height: 50vh;
        overflow-y: auto; 
        overflow-x: hidden; 
      }
      .chertog-item:nth-child(n+9) {
        margin-top: 0;
      }
      .chertog-item.active {
        transform: scale(1.05);
        position: relative;
        scroll-margin-top: 20vh;
      }
      .header { 
        min-width: 90vw; 
        width: 95vw; 
        padding: 2vh 15px; 
        margin-bottom: 2vh; 
      }
      h1.mysterious-text { 
        font-size: clamp(22px, 5vw, 32px); 
      }
      .input-container { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        gap: 10px; 
      }
      input[type="text"] { 
        width: 80vw; 
        max-width: 300px; 
        font-size: 18px; 
        padding: 12px 15px; 
        min-height: 44px; 
      }
      .modal.visible { 
        padding: 0; 
      }
      .modal-img-container { 
        padding: 70px 15px 80px; 
      }
      .modal-img { 
        max-height: calc(100vh - 150px); 
        opacity: 0.2; 
      }
      .modal-content { 
        max-width: 95vw; 
        width: 95vw; 
        margin-top: 60px; 
        margin-bottom: 20px !important; 
        padding: 20px 15px; 
        font-size: 16px; 
        line-height: 1.5; 
      }
      .close-btn { 
        position: fixed; 
        top: 10px; 
        right: 15px; 
        font-size: 48px; 
        width: 50px; 
        height: 50px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: rgba(0, 0, 0, 0.5); 
        border-radius: 50%; 
        z-index: 1001; 
      }
      .audio-control { 
        top: 10px; 
        left: 10px; 
        width: 40px; 
        height: 40px; 
      }
      .audio-control svg { 
        width: 20px; 
        height: 20px; 
      }
    }

    
    /* Weak smartphones (≤600px) - disable heavy effects */
    @media (max-width: 600px) {
      .mysterious-text {
        animation: none !important;
        text-shadow: 0 0 5px #7b2cbf !important;
      }

      .header {
        box-shadow: 0 0 10px rgba(123, 44, 191, 0.3) !important;
      }

      input[type="text"] {
        box-shadow: 0 0 5px rgba(157, 78, 221, 0.3) !important;
      }

      input[type="text"]:focus {
        box-shadow: 0 0 8px rgba(157, 78, 221, 0.5) !important;
      }

      .chertog-item {
        filter: none !important;
        box-shadow: 0 0 5px rgba(123, 44, 191, 0.3) !important;
      }

      .modal {
        backdrop-filter: none !important;
      }

      .modal-img {
        filter: none !important;
      }

      /* Add will-change for smooth animations */
      .chertog-item,
      .modal,
      .modal-img,
      .shop-link {
        will-change: transform;
      }
    }

/* Mobile phones (≤480px) */
    @media (max-width: 480px) {
      body { 
        padding: 8px; 
      }
      .header { 
        padding: 8px; 
        border-radius: 14px; 
        min-width: 95vw; 
      }
      h1.mysterious-text { 
        font-size: clamp(20px, 6vw, 26px); 
        margin: 5px 0; 
      }
      label.mysterious-text { 
        font-size: clamp(16px, 5vw, 20px) !important; 
      }
      input[type="text"] { 
        width: 85vw; 
        font-size: 20px; 
        padding: 14px 18px; 
        min-height: 48px; 
        border-radius: 10px; 
      }
      .chertog-grid { 
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: none;
        grid-auto-rows: max-content;
        align-content: start;
        gap: 3vw; 
        width: 100vw;
        max-width: 100vw;
        padding: 0 5vw;
        margin: 5vh auto 0;
        height: 60vh;
        overflow-y: auto; 
        overflow-x: hidden; 
      }
      .chertog-item:nth-child(n+9) {
        margin-top: 0;
      }
      .modal-img-container { 
        padding: 60px 10px 70px; 
      }
      .modal-img { 
        max-height: calc(100vh - 130px); 
        opacity: 0.18; 
      }
      .modal-content { 
        padding: 15px 12px; 
        margin-top: 55px; 
        border-radius: 10px; 
        font-size: 15px; 
      }
      .close-btn { 
        top: 5px; 
        right: 10px; 
        font-size: 42px; 
        width: 44px; 
        height: 44px; 
        z-index: 1001; 
      }
      #result { 
        font-size: clamp(15px, 5vw, 18px); 
        margin-top: 10px !important; 
        padding: 10px; 
      }
    }
  </style>
</head>
<body>
  <!-- Audio element for background music -->
  <!-- Audio element will be created dynamically -->
<!-- Mute/Unmute button -->
  <button class="audio-control" id="muteBtn" type="button" aria-label="Включить звук" title="Включить звук">
    <svg viewBox="0 0 24 24" id="speakerIcon">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" id="soundWave1"></path>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" id="soundWave2"></path>
    </svg>
  </button>

  <div class="header">
    <h1 class="mysterious-text">Определи свой Чертог</h1>
    <div class="input-container">
      <label for="birthDate" class="mysterious-text">Дата рождения:</label>
      <input type="text" id="birthDate" readonly inputmode="none" placeholder="Выберите дату" />
    </div>
    <div id="result" class="mysterious-text"></div>
  </div>

  <div class="chertog-grid" id="grid"></div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="close-btn" id="closeBtn">&times;</div>
    <div class="modal-img-container">
      <img class="modal-img" id="modalImg" alt="" />
    </div>
    <div class="modal-content mysterious-text" id="modalText"></div>
  </div>

  <script src="app_ru.min.js"></script>
</body>
</html>
